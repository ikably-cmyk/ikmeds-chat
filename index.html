<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#4A1528" />
<title>ikmeds</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --color-primary: #4A1528;
    --color-secondary: #9C6B7A;
    --color-light: #F5F0EC;
    --color-bg: #FFFFFF;
    --color-text: #2D1B22;
    --color-text-soft: #6B5560;
    --color-border: #E8DDD8;
    --color-chip-bg: #F5F0EC;
    --color-chip-active: #4A1528;
    --color-chip-active-text: #FFFFFF;
    --color-danger: #B33A3A;
    --color-success: #2E7D4F;
    --shadow-sm: 0 1px 2px rgba(74, 21, 40, 0.05);
    --shadow-md: 0 4px 12px rgba(74, 21, 40, 0.08);
    --radius: 12px;
    --radius-lg: 16px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'DM Mono', ui-monospace, monospace; letter-spacing: -0.01em; }

  .app {
    max-width: 780px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 16px 32px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0;
    border-bottom: 1px solid var(--color-border);
    margin-bottom: 20px;
    gap: 12px;
  }
  .logo {
    font-weight: 800;
    font-size: 20px;
    color: var(--color-primary);
    letter-spacing: -0.02em;
  }
  .logo-dot { color: var(--color-secondary); }
  .header-right { display: flex; align-items: center; gap: 8px; }

  .credits-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 999px;
    background: var(--color-chip-bg);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--color-primary);
    font-weight: 500;
  }
  .credits-pill.low { background: #FDECEC; color: var(--color-danger); }

  .lang-select {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    border: 1px solid var(--color-border);
    background: var(--color-bg);
    color: var(--color-text);
    padding: 6px 8px;
    border-radius: 8px;
    cursor: pointer;
  }

  /* Home */
  .welcome {
    padding: 8px 0 20px;
  }
  .welcome h1 {
    font-size: 26px;
    margin: 0 0 6px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--color-primary);
  }
  .welcome p { margin: 0; color: var(--color-text-soft); }

  .modules {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  @media (max-width: 520px) {
    .modules { grid-template-columns: 1fr; }
  }
  .module-card {
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    background: var(--color-bg);
    transition: all .15s ease;
    text-align: left;
    font-family: inherit;
  }
  .module-card:hover {
    border-color: var(--color-secondary);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .module-card .ico {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--color-secondary);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  .module-card h3 {
    margin: 0 0 4px;
    font-size: 16px;
    font-weight: 700;
    color: var(--color-primary);
  }
  .module-card p {
    margin: 0;
    font-size: 13px;
    color: var(--color-text-soft);
  }

  /* Forms */
  .module-view { display: none; }
  .module-view.active { display: block; }

  .back-btn {
    background: none;
    border: none;
    color: var(--color-secondary);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    padding: 4px 0;
    margin-bottom: 10px;
  }
  .back-btn:hover { color: var(--color-primary); }

  .form-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--color-primary);
    margin: 0 0 4px;
    letter-spacing: -0.02em;
  }
  .form-sub {
    color: var(--color-text-soft);
    font-size: 13px;
    margin: 0 0 18px;
  }

  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--color-primary);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .field input,
  .field textarea,
  .field select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--color-border);
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    background: var(--color-bg);
    color: var(--color-text);
    transition: border-color .15s ease;
  }
  .field textarea { min-height: 90px; resize: vertical; }
  .field input:focus,
  .field textarea:focus,
  .field select:focus {
    outline: none;
    border-color: var(--color-primary);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 18px;
    border-radius: 10px;
    background: var(--color-primary);
    color: #fff;
    border: none;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s ease;
    width: 100%;
  }
  .btn:hover { background: #5f1e36; }
  .btn:disabled { background: var(--color-secondary); cursor: not-allowed; opacity: .7; }
  .btn-secondary {
    background: var(--color-chip-bg);
    color: var(--color-primary);
  }
  .btn-secondary:hover { background: #EADFD9; }

  /* Response area */
  .response-wrap { margin-top: 24px; }
  .response {
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
    padding: 18px;
    background: var(--color-light);
  }
  .response h1,
  .response h2,
  .response h3 {
    color: var(--color-primary);
    margin: 18px 0 8px;
    font-weight: 700;
  }
  .response h1 { font-size: 18px; }
  .response h2 { font-size: 16px; }
  .response h3 { font-size: 14px; }
  .response p { margin: 8px 0; }
  .response ul, .response ol { margin: 8px 0; padding-left: 20px; }
  .response li { margin: 4px 0; }
  .response strong { color: var(--color-primary); }
  .response code {
    background: #fff;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    border: 1px solid var(--color-border);
  }
  .response table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0;
    font-size: 13px;
  }
  .response th, .response td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--color-border);
    text-align: left;
  }
  .response th {
    background: #fff;
    color: var(--color-primary);
    font-weight: 700;
  }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px;
    color: var(--color-text-soft);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }
  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--color-border);
    border-top-color: var(--color-primary);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Follow-up chat */
  .followup {
    margin-top: 20px;
    border-top: 1px solid var(--color-border);
    padding-top: 20px;
  }
  .followup-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--color-primary);
    margin: 0 0 12px;
  }
  .chat-history {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
    max-height: 360px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .chat-msg {
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 90%;
    font-size: 14px;
    line-height: 1.45;
  }
  .chat-msg.user {
    align-self: flex-end;
    background: var(--color-primary);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .chat-msg.assistant {
    align-self: flex-start;
    background: var(--color-light);
    color: var(--color-text);
    border-bottom-left-radius: 4px;
  }
  .chat-input-row {
    display: flex;
    gap: 8px;
  }
  .chat-input-row textarea {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid var(--color-border);
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    resize: none;
    min-height: 42px;
    max-height: 120px;
  }
  .chat-input-row textarea:focus { outline: none; border-color: var(--color-primary); }
  .chat-input-row .btn {
    width: auto;
    padding: 0 16px;
    font-size: 13px;
  }

  /* Upgrade card */
  .upgrade {
    border: 2px solid var(--color-primary);
    border-radius: var(--radius-lg);
    padding: 20px;
    background: linear-gradient(180deg, #FFFFFF, var(--color-light));
    margin: 16px 0;
  }
  .upgrade h3 {
    margin: 0 0 6px;
    color: var(--color-primary);
    font-size: 18px;
  }
  .upgrade p { margin: 0 0 14px; color: var(--color-text-soft); font-size: 14px; }
  .upgrade-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  @media (max-width: 480px) {
    .upgrade-grid { grid-template-columns: 1fr; }
  }
  .pay-btn {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 12px 14px;
    border: 1px solid var(--color-border);
    border-radius: 10px;
    background: #fff;
    color: var(--color-primary);
    text-decoration: none;
    font-size: 13px;
    transition: all .15s ease;
  }
  .pay-btn:hover {
    border-color: var(--color-primary);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }
  .pay-btn .flag { font-size: 16px; margin-bottom: 2px; }
  .pay-btn .price {
    font-family: 'DM Mono', monospace;
    font-weight: 600;
    font-size: 14px;
  }
  .pay-btn .label { color: var(--color-text-soft); font-size: 12px; }

  /* Error banner */
  .error-banner {
    background: #FDECEC;
    color: var(--color-danger);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    margin: 10px 0;
  }

  /* Radio group for laser_pbm */
  .radio-group { display: flex; gap: 8px; }
  .radio-group label {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    border: 1px solid var(--color-border);
    border-radius: 10px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    text-transform: none;
    letter-spacing: 0;
    color: var(--color-text);
    margin: 0;
  }
  .radio-group input[type="radio"] { display: none; }
  .radio-group input[type="radio"]:checked + span {
    color: var(--color-primary);
    font-weight: 600;
  }
  .radio-group label:has(input:checked) {
    border-color: var(--color-primary);
    background: var(--color-chip-bg);
  }

  .hidden { display: none !important; }
</style>
</head>

/* -------- Module field definitions -------- */
const MODULE_FIELDS = {
  consulta: ['nombre_paciente', 'query'],
  expediente: ['nombre_paciente', 'HistClin', 'procedimiento', 'anestesia', 'medstomando', 'receta', 'laser_pbm', 'objetivo_PBM', 'dispositivo_laser'],
  interconsulta: ['nombre_paciente', 'HistClin', 'procedimiento', 'anestesia', 'medstomando', 'receta', 'laser_pbm', 'objetivo_PBM', 'dispositivo_laser'],
  calculadora: ['nombre_paciente', 'procedimiento', 'peso_paciente', 'medicamento', 'condicion'],
  pbm: ['nombre_paciente', 'objetivo_PBM', 'dispositivo_laser', 'area_tratamiento'],
};

const TIPO_DE_REPORTE_MAP = {
  consulta: 'Consulta rápida / Quick consult',
  expediente: 'Expediente / Full report',
  interconsulta: 'Interconsulta / Referral',
  calculadora: 'Calculadora / Calculator',
  pbm: 'PBM',
};

/* -------- State -------- */
const state = {
  userEmail: '',
  language: 'es',
  module: null,
  credits: null,
  sessionCreditUsed: false,
  conversationHistory: [],
  formData: {},
};

function t() { return I18N[state.language] || I18N.es; }

/* -------- URL params -------- */
function parseURL() {
  const url = new URL(window.location.href);
  state.userEmail = url.searchParams.get('email') || '';
  const mod = url.searchParams.get('module');
  if (mod && MODULE_FIELDS[mod]) state.module = mod;
  const lang = url.searchParams.get('lang');
  if (lang && I18N[lang]) state.language = lang;
}

/* -------- Rendering -------- */
function setLang(lang) {
  state.language = lang;
  document.documentElement.lang = lang;
  document.getElementById('lang-select').value = lang;
  renderAll();
}

function renderCreditsPill() {
  const pill = document.getElementById('credits-pill');
  if (state.credits === null) {
    pill.textContent = '—';
    pill.classList.remove('low');
    return;
  }
  pill.textContent = state.credits + ' ' + t().credits;
  pill.classList.toggle('low', state.credits <= 0);
}

function renderWelcome() {
  const name = state.userEmail ? state.userEmail.split('@')[0] : '';
  document.getElementById('welcome-title').textContent = `${t().hello}${name ? ', ' + name : ''} 👋`;
  document.getElementById('welcome-sub').textContent = t().choose_module;
}

function renderModules() {
  const wrap = document.getElementById('modules');
  wrap.innerHTML = '';
  const mods = t().modules;
  Object.keys(MODULE_FIELDS).forEach(key => {
    const m = mods[key];
    const btn = document.createElement('button');
    btn.className = 'module-card';
    btn.innerHTML = `
      <div class="ico">${m.ico}</div>
      <h3>${m.title}</h3>
      <p>${m.desc}</p>
    `;
    btn.addEventListener('click', () => openModule(key));
    wrap.appendChild(btn);
  });
}

function renderUpgradeCard(containerId) {
  const el = document.getElementById(containerId);
  const L = t();
  el.innerHTML = `
    <div class="upgrade">
      <h3>${L.out_of_credits_title}</h3>
      <p>${L.out_of_credits_body}</p>
      <div class="upgrade-grid">
        <a class="pay-btn" href="${STRIPE_LINKS.topup10_mxn}" target="_blank" rel="noopener">
          <span class="flag">🇲🇽</span>
          <span class="price">$60 MXN</span>
          <span class="label">${L.topup10_label}</span>
        </a>

          <span class="flag">🌍</span>
          <span class="price">$3 USD</span>
          <span class="label">${L.topup10_label}</span>
        </a>
        <a class="pay-btn" href="${STRIPE_LINKS.topup25_mxn}" target="_blank" rel="noopener">
          <span class="flag">🇲🇽</span>
          <span class="price">$125 MXN</span>
          <span class="label">${L.topup25_label}</span>
        </a>
        <a class="pay-btn" href="${STRIPE_LINKS.topup25_usd}" target="_blank" rel="noopener">
          <span class="flag">🌍</span>
          <span class="price">$6.25 USD</span>
          <span class="label">${L.topup25_label}</span>
        </a>
      </div>
    </div>
  `;
  el.classList.remove('hidden');
}

function hide(id) { document.getElementById(id).classList.add('hidden'); }
function show(id) { document.getElementById(id).classList.remove('hidden'); }

function renderModuleForm() {
  if (!state.module) return;
  const L = t();
  const mods = L.modules;
  const m = mods[state.module];
  document.getElementById('module-title').textContent = m.title;
  document.getElementById('module-sub').textContent = m.desc;
  document.getElementById('back-label').textContent = L.back;
  document.getElementById('submit-label').textContent = L.consult;
  document.getElementById('chat-send-label').textContent = L.send;
  document.getElementById('followup-title').textContent = L.followup_title;
  document.getElementById('chat-input').placeholder = L.followup_placeholder;

  const container = document.getElementById('form-container');
  container.innerHTML = '';
  const fields = MODULE_FIELDS[state.module];
  fields.forEach(f => container.appendChild(renderField(f)));
}

function renderField(fieldName) {
  const L = t().fields;
  const wrap = document.createElement('div');
  wrap.className = 'field';
  const label = document.createElement('label');
  label.textContent = L[fieldName] || fieldName;
  label.setAttribute('for', 'f-' + fieldName);
  wrap.appendChild(label);

  if (fieldName === 'laser_pbm') {
    const group = document.createElement('div');
    group.className = 'radio-group';
    ['yes', 'no'].forEach((val, i) => {
      const lbl = document.createElement('label');
      const input = document.createElement('input');
      input.type = 'radio';
      input.name = 'laser_pbm';
      input.value = val === 'yes' ? 'Sí' : 'No';
      if (i === 1) input.checked = true;
      input.addEventListener('change', () => { state.formData.laser_pbm = input.value; });
      const sp = document.createElement('span');
      sp.textContent = L[val];
      lbl.appendChild(input);
      lbl.appendChild(sp);
      group.appendChild(lbl);
    });
    state.formData.laser_pbm = 'No';
    wrap.appendChild(group);
    return wrap;
  }

  const isTextarea = ['query', 'HistClin', 'medstomando', 'receta', 'condicion', 'objetivo_PBM'].includes(fieldName);
  const isNumber = fieldName === 'peso_paciente';
  const input = document.createElement(isTextarea ? 'textarea' : 'input');
  if (!isTextarea) input.type = isNumber ? 'number' : 'text';
  input.id = 'f-' + fieldName;
  if (fieldName === 'query') input.placeholder = L.query_ph;
  input.addEventListener('input', () => { state.formData[fieldName] = input.value; });
  wrap.appendChild(input);
  return wrap;
}

function openModule(key) {
  state.module = key;
  state.sessionCreditUsed = false;
  state.conversationHistory = [];
  state.formData = {};
  hide('view-home');
  show('view-module');
  hide('response-wrap');
  hide('followup');
  hide('upgrade-module');
  document.getElementById('error-box').innerHTML = '';
  document.getElementById('chat-history').innerHTML = '';
  renderModuleForm();
  window.scrollTo(0, 0);
}

function goHome() {
  state.module = null;
  hide('view-module');
  show('view-home');
  renderAll();
  window.scrollTo(0, 0);
}

function renderAll() {
  renderCreditsPill();
  renderWelcome();
  renderModules();
  if (state.credits !== null && state.credits <= 0) {
    renderUpgradeCard('upgrade-home');
  } else {
    hide('upgrade-home');
  }
  if (state.module) renderModuleForm();
}

/* -------- Profile fetch -------- */
async function fetchProfile() {
  if (!state.userEmail) { state.credits = null; return; }
  try {
    const url = N8N_PROFILE_URL + '?email=' + encodeURIComponent(state.userEmail);
    const r = await fetch(url, { method: 'GET' });
    if (!r.ok) throw new Error('profile fetch failed');
    const data = await r.json();
    state.credits = Number(data.credits_balance) || 0;
  } catch (e) {
    console.warn('Profile error:', e);
    state.credits = null;
  }
  renderCreditsPill();
  if (state.credits !== null && state.credits <= 0 && !state.module) {
    renderUpgradeCard('upgrade-home');
  }
}

/* -------- Markdown (minimal) -------- */
function mdToHtml(md) {
  if (!md) return '';
  let s = String(md);
  s = s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // code fences
  s = s.replace(/```([\s\S]*?)```/g, (_, c) => `<pre><code>${c}</code></pre>`);
  // inline code
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // headings
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // bold / italic
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  // tables (simple pipe table)
  s = s.replace(/((?:^\|.+\|\s*\n)+)/gm, block => {
    const lines = block.trim().split('\n');
    if (lines.length < 2) return block;
    const headerCells = lines[0].slice(1, -1).split('|').map(x => x.trim());
    const sep = lines[1];
    if (!/^\|[\s\-:|]+\|$/.test(sep)) return block;
    const rows = lines.slice(2).map(l => l.slice(1, -1).split('|').map(x => x.trim()));
    let html = '<table><thead><tr>' + headerCells.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';
    rows.forEach(r => { html += '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '</tr>'; });
    html += '</tbody></table>';
    return html;
  });
  // lists
  s = s.replace(/^(?:-|\*) (.+)$/gm, '<li>$1</li>');
  s = s.replace(/(<li>.*?<\/li>\s*)+/gs, m => `<ul>${m}</ul>`);
  s = s.replace(/^(\d+)\. (.+)$/gm, '<oli>$2</oli>');
  s = s.replace(/(<oli>.*?<\/oli>\s*)+/gs, m => `<ol>${m.replace(/<oli>/g, '<li>').replace(/<\/oli>/g, '</li>')}</ol>`);
  // paragraphs: split on blank lines
  s = s.split(/\n{2,}/).map(block => {
    if (/^<(h\d|ul|ol|pre|table|blockquote)/.test(block.trim())) return block;
    return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
  return s;
}

/* -------- Submit -------- */
async function submitQuery(userMessage, opts = {}) {
  const isFollowup = !!opts.isFollowup;
  const isFirstMessage = !state.sessionCreditUsed;
  const L = t();
  const errBox = document.getElementById('error-box');
  errBox.innerHTML = '';

  // Build conversation_history string
  const historyText = state.conversationHistory.map(m => {
    const role = m.role === 'user' ? 'Doctor' : 'Assistant';
    return `${role}: ${m.content}`;
  }).join('\n');

  const body = {
    user_email: state.userEmail,
    last_message: userMessage,
    history: historyText,
    language: state.language,
    is_first_message: isFirstMessage,
    tipo_de_reporte: TIPO_DE_REPORTE_MAP[state.module] || '',
    nombre_paciente: state.formData.nombre_paciente || '',
    HistClin: state.formData.HistClin || '',
    procedimiento: state.formData.procedimiento || '',
    anestesia: state.formData.anestesia || '',
    medstomando: state.formData.medstomando || '',
    receta: state.formData.receta || '',
    laser_pbm: state.formData.laser_pbm || '',
    objetivo_PBM: state.formData.objetivo_PBM || '',
    dispositivo_laser: state.formData.dispositivo_laser || '',
    peso_paciente: state.formData.peso_paciente || '',
    medicamento: state.formData.medicamento || '',
    condicion: state.formData.condicion || '',
    area_tratamiento: state.formData.area_tratamiento || '',
    query: state.formData.query || '',
  };

  // UI: show loading
  if (!isFollowup) {
    show('response-wrap');
    document.getElementById('response').innerHTML = `
      <div class="loading"><div class="spinner"></div><span>${L.loading}</span></div>
    `;
    document.getElementById('submit-btn').disabled = true;
  } else {
    appendChatMsg('user', userMessage);
    const history = document.getElementById('chat-history');
    const loadingMsg = document.createElement('div');
    loadingMsg.className = 'chat-msg assistant';
    loadingMsg.innerHTML = `<div class="loading"><div class="spinner"></div><span>${L.loading}</span></div>`;
    loadingMsg.dataset.loading = '1';
    history.appendChild(loadingMsg);
    history.scrollTop = history.scrollHeight;
    document.getElementById('chat-send').disabled = true;
  }

  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 90000);
    const r = await fetch(N8N_CHAT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: controller.signal,
    });
    clearTimeout(timeoutId);

    if (r.status === 403) {
      state.credits = 0;
      renderCreditsPill();
      if (!isFollowup) {
        document.getElementById('response').innerHTML = '';
        hide('response-wrap');
      } else {
        removeLoadingChatMsg();
      }
      renderUpgradeCard('upgrade-module');
      return;
    }

    if (!r.ok) throw new Error('HTTP ' + r.status);

    const data = await r.json();
    const answer = data.response || '';

    if (isFirstMessage) {
      state.sessionCreditUsed = true;
      if (state.credits !== null && state.credits > 0) state.credits -= 1;
      renderCreditsPill();
    }

    // Update history
    state.conversationHistory.push({ role: 'user', content: userMessage });
    state.conversationHistory.push({ role: 'assistant', content: answer });

    if (!isFollowup) {
      document.getElementById('response').innerHTML = mdToHtml(answer);
      show('followup');
    } else {
      removeLoadingChatMsg();
      appendChatMsg('assistant', answer);
    }
  } catch (e) {
    console.error(e);
    if (!isFollowup) {
      document.getElementById('response').innerHTML = '';
      hide('response-wrap');
    } else {
      removeLoadingChatMsg();
    }
    errBox.innerHTML = `<div class="error-banner">${L.error_network}</div>`;
  } finally {
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('chat-send').disabled = false;
  }
}

function appendChatMsg(role, text) {
  const history = document.getElementById('chat-history');
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  div.innerHTML = role === 'assistant' ? mdToHtml(text) : escapeHtml(text);
  history.appendChild(div);
  history.scrollTop = history.scrollHeight;
}
function removeLoadingChatMsg() {
  const history = document.getElementById('chat-history');
  const loading = history.querySelector('[data-loading="1"]');
  if (loading) loading.remove();
}
function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* -------- Validation -------- */
function validateForm() {
  if (state.module === 'consulta') {
    return (state.formData.query || '').trim().length > 0;
  }
  if (state.module === 'expediente' || state.module === 'interconsulta') {
    return (state.formData.procedimiento || '').trim().length > 0;
  }
  if (state.module === 'calculadora') {
    return (state.formData.medicamento || '').trim().length > 0;
  }
  if (state.module === 'pbm') {
    return (state.formData.objetivo_PBM || '').trim().length > 0;
  }
  return true;
}

/* -------- Event binding -------- */
function bindEvents() {
  document.getElementById('lang-select').addEventListener('change', e => setLang(e.target.value));
  document.getElementById('back-btn').addEventListener('click', goHome);

  document.getElementById('submit-btn').addEventListener('click', () => {
    if (state.credits !== null && state.credits <= 0 && !state.sessionCreditUsed) {
      renderUpgradeCard('upgrade-module');
      return;
    }
    if (!validateForm()) {
      document.getElementById('error-box').innerHTML =
        `<div class="error-banner">${t().error_generic}</div>`;
      return;
    }
    // Build a summary message of the form for the agent
    const payloadSummary = buildInitialMessage();
    submitQuery(payloadSummary, { isFollowup: false });
  });

  const chatInput = document.getElementById('chat-input');
  const chatSend = document.getElementById('chat-send');
  const sendChat = () => {
    const val = chatInput.value.trim();
    if (!val) return;
    chatInput.value = '';
    submitQuery(val, { isFollowup: true });
  };
  chatSend.addEventListener('click', sendChat);
  chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  });
}

function buildInitialMessage() {
  const mod = state.module;
  const f = state.formData;
  if (mod === 'consulta') return f.query || '';
  const lines = [];
  if (f.nombre_paciente) lines.push(`Paciente: ${f.nombre_paciente}`);
  if (f.HistClin) lines.push(`Historia clínica: ${f.HistClin}`);
  if (f.procedimiento) lines.push(`Procedimiento: ${f.procedimiento}`);
  if (f.anestesia) lines.push(`Anestésico: ${f.anestesia}`);
  if (f.medstomando) lines.push(`Medicamentos actuales: ${f.medstomando}`);
  if (f.receta) lines.push(`A recetar: ${f.receta}`);
  if (f.laser_pbm) lines.push(`Láser/PBM: ${f.laser_pbm}`);
  if (f.objetivo_PBM) lines.push(`Objetivo PBM: ${f.objetivo_PBM}`);
  if (f.dispositivo_laser) lines.push(`Dispositivo: ${f.dispositivo_laser}`);
  if (f.peso_paciente) lines.push(`Peso: ${f.peso_paciente} kg`);
  if (f.medicamento) lines.push(`Medicamento: ${f.medicamento}`);
  if (f.condicion) lines.push(`Condición: ${f.condicion}`);
  if (f.area_tratamiento) lines.push(`Área: ${f.area_tratamiento}`);
  return lines.join('\n');
}

/* -------- Init -------- */
async function init() {
  parseURL();
  document.getElementById('lang-select').value = state.language;
  document.documentElement.lang = state.language;
  bindEvents();
  renderAll();
  await fetchProfile();
  if (state.module) openModule(state.module);
}

init();
</script>
