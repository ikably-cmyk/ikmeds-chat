<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0F4C5C" />
<title>IKMeds</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  /* =====================================================
   * IKMeds · Design Tokens (Teal Médico Profundo)
   * ===================================================== */
  :root {
    --primary:     #0F4C5C;
    --primary-90:  rgba(15, 76, 92, 0.90);
    --primary-10:  rgba(15, 76, 92, 0.10);
    --primary-5:   rgba(15, 76, 92, 0.05);

    --secondary:   #5A8A8B;
    --sec-30:      rgba(90, 138, 139, 0.30);
    --sec-10:      rgba(90, 138, 139, 0.10);

    --bg:          #F4F1EC;
    --bg-soft:     #FAF7F2;
    --bg-dark:     #E8E2D8;

    --ink:         #0A1F26;
    --ink-soft:    #3D5560;
    --ink-mute:    #8A9499;

    --warning:     #6B4600;
    --warn-bg:     #FAE294;
    --warn-border: #E8C77A;
    --success:     #4A7C59;
    --success-bg:  #E7F0E5;
    --error:       #A53F2B;
    --error-bg:    #FBEAE6;

    --font-serif:  'Instrument Serif', Georgia, serif;
    --font-sans:   'Instrument Sans', system-ui, -apple-system, sans-serif;
    --font-mono:   'Space Mono', ui-monospace, 'SFMono-Regular', monospace;

    --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
    --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;

    --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-pill: 999px;

    --shadow-sm: 0 1px 2px rgba(15, 76, 92, 0.06);
    --shadow-md: 0 4px 16px rgba(15, 76, 92, 0.10);
    --shadow-lg: 0 12px 32px rgba(15, 76, 92, 0.14);

    --transition: 220ms cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .mono { font-family: var(--font-mono); letter-spacing: -0.01em; }

  .app {
    max-width: 780px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 16px 32px;
  }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 0 14px;
    border-bottom: 1px solid var(--bg-dark);
    margin-bottom: 22px; gap: 12px;
  }
  .logo {
    font-family: var(--font-serif);
    font-weight: 400; font-size: 24px;
    color: var(--primary); letter-spacing: -0.015em; line-height: 1;
  }
  .logo-dot { color: var(--secondary); font-style: italic; }
  .header-right { display: flex; align-items: center; gap: 8px; }

  .credits-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: var(--radius-pill);
    background: var(--primary-5);
    font-family: var(--font-mono); font-size: 11px;
    color: var(--primary); font-weight: 700; letter-spacing: 0.01em;
  }
  .credits-pill.low { background: var(--error-bg); color: var(--error); }

  .lang-select {
    font-family: var(--font-mono); font-size: 11px;
    border: 1px solid var(--bg-dark);
    background: var(--bg-soft); color: var(--ink-soft);
    padding: 6px 10px; border-radius: var(--radius-sm);
    cursor: pointer; font-weight: 600; letter-spacing: 0.02em;
  }
  .lang-select:focus { outline: none; border-color: var(--primary); }

  /* Home */
  .welcome { padding: 4px 0 22px; }
  .welcome h1 {
    font-family: var(--font-serif);
    font-size: 30px; margin: 0 0 6px; font-weight: 400;
    letter-spacing: -0.02em; line-height: 1.08; color: var(--primary);
  }
  .welcome p { margin: 0; color: var(--ink-soft); font-size: 14.5px; }

  .modules {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-bottom: 16px;
  }
  @media (max-width: 520px) { .modules { grid-template-columns: 1fr; } }
  .module-card {
    border: 1px solid var(--bg-dark);
    border-radius: var(--radius-lg); padding: 16px;
    cursor: pointer; background: var(--bg-soft);
    transition: all var(--transition);
    text-align: left; font-family: inherit;
  }
  .module-card:hover {
    border-color: var(--sec-30);
    transform: translateY(-1px); box-shadow: var(--shadow-md);
  }
  .module-card .ico {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--secondary); margin-bottom: 8px;
    letter-spacing: 0.10em; text-transform: uppercase; font-weight: 700;
  }
  .module-card h3 {
    margin: 0 0 4px; font-size: 16px; font-weight: 600;
    color: var(--primary); font-family: var(--font-sans);
    letter-spacing: -0.01em;
  }
  .module-card p { margin: 0; font-size: 13px; color: var(--ink-soft); line-height: 1.4; }

  /* Forms (módulos NO-expediente) */
  .module-view { display: none; }
  .module-view.active { display: block; }

  .back-btn {
    background: none; border: none; color: var(--secondary);
    font-family: var(--font-mono); font-size: 11px;
    cursor: pointer; padding: 4px 0; margin-bottom: 12px;
    text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700;
  }
  .back-btn:hover { color: var(--primary); }

  .form-title {
    font-family: var(--font-serif); font-size: 26px; font-weight: 400;
    color: var(--primary); margin: 0 0 4px;
    letter-spacing: -0.02em; line-height: 1.1;
  }
  .form-sub { color: var(--ink-soft); font-size: 13.5px; margin: 0 0 20px; }

  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-family: var(--font-mono);
    font-size: 10.5px; color: var(--primary);
    margin-bottom: 6px; letter-spacing: 0.08em;
    text-transform: uppercase; font-weight: 700;
  }
  .field input, .field textarea, .field select {
    width: 100%; padding: 11px 13px;
    border: 1px solid var(--bg-dark); border-radius: var(--radius-sm);
    font-family: var(--font-sans); font-size: 14px;
    background: var(--bg-soft); color: var(--ink);
    transition: border-color var(--transition), background var(--transition);
  }
  .field textarea { min-height: 92px; resize: vertical; line-height: 1.5; }
  .field input::placeholder, .field textarea::placeholder { color: var(--ink-mute); }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none; border-color: var(--primary); background: #FFFFFF;
  }

  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px; padding: 13px 18px; border-radius: var(--radius-sm);
    background: var(--primary); color: var(--bg-soft);
    border: none; font-weight: 600; font-size: 14px;
    cursor: pointer; font-family: var(--font-sans);
    transition: background var(--transition), opacity var(--transition);
    width: 100%; letter-spacing: -0.01em;
  }
  .btn:hover { background: var(--primary-90); }
  .btn:disabled { background: var(--secondary); cursor: not-allowed; opacity: 0.65; }

  /* Response */
  .response-wrap { margin-top: 24px; }
  .response {
    border: 1px solid var(--bg-dark);
    border-radius: var(--radius-md); padding: 20px;
    background: var(--bg-soft);
  }
  .response h1, .response h2, .response h3 {
    color: var(--primary); margin: 18px 0 8px; font-weight: 600;
    font-family: var(--font-sans); letter-spacing: -0.01em;
  }
  .response h1 { font-size: 19px; }
  .response h2 { font-size: 16px; }
  .response h3 { font-size: 14px; }
  .response p { margin: 8px 0; }
  .response ul, .response ol { margin: 8px 0; padding-left: 20px; }
  .response li { margin: 4px 0; }
  .response strong { color: var(--primary); font-weight: 600; }
  .response code {
    background: #FFFFFF; padding: 2px 6px; border-radius: 4px;
    font-family: var(--font-mono); font-size: 12.5px;
    border: 1px solid var(--bg-dark); color: var(--ink);
  }
  .response pre {
    background: #FFFFFF; padding: 12px; border-radius: var(--radius-sm);
    overflow-x: auto; border: 1px solid var(--bg-dark); font-size: 12.5px;
  }
  .response pre code { border: none; padding: 0; background: transparent; }
  .response table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
  .response th, .response td { padding: 9px 11px; border-bottom: 1px solid var(--bg-dark); text-align: left; }
  .response th {
    background: #FFFFFF; color: var(--primary); font-weight: 700;
    font-family: var(--font-mono); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.06em;
  }

  /* Loading */
  .loading {
    display: flex; align-items: center; gap: 10px; padding: 16px;
    color: var(--ink-soft); font-family: var(--font-mono);
    font-size: 12.5px; letter-spacing: 0.02em;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--bg-dark);
    border-top-color: var(--primary);
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Followup */
  .followup { margin-top: 22px; border-top: 1px solid var(--bg-dark); padding-top: 20px; }
  .followup-title {
    font-size: 14px; font-weight: 600; color: var(--primary);
    margin: 0 0 14px; font-family: var(--font-sans); letter-spacing: -0.01em;
  }
  .chat-history {
    display: flex; flex-direction: column; gap: 10px;
    margin-bottom: 14px; max-height: 360px; overflow-y: auto; padding-right: 4px;
  }
  .chat-msg { padding: 11px 15px; border-radius: var(--radius-md); max-width: 90%; font-size: 14px; line-height: 1.5; }
  .chat-msg.user { align-self: flex-end; background: var(--primary); color: var(--bg-soft); border-bottom-right-radius: 4px; }
  .chat-msg.assistant {
    align-self: flex-start; background: var(--bg-soft);
    border: 1px solid var(--bg-dark); color: var(--ink); border-bottom-left-radius: 4px;
  }
  .chat-input-row { display: flex; gap: 8px; }
  .chat-input-row textarea {
    flex: 1; padding: 11px 13px; border: 1px solid var(--bg-dark);
    border-radius: var(--radius-sm); font-family: var(--font-sans); font-size: 14px;
    background: var(--bg-soft); color: var(--ink); resize: none;
    min-height: 44px; max-height: 120px; line-height: 1.5;
  }
  .chat-input-row textarea::placeholder { color: var(--ink-mute); }
  .chat-input-row textarea:focus { outline: none; border-color: var(--primary); background: #FFFFFF; }
  .chat-input-row .btn { width: auto; padding: 0 18px; font-size: 13px; }

  /* Upgrade */
  .upgrade {
    border: 1px solid var(--primary); border-radius: var(--radius-lg);
    padding: 22px 20px; background: var(--bg-soft);
    margin: 16px 0; box-shadow: var(--shadow-sm);
  }
  .upgrade h3 {
    margin: 0 0 6px; color: var(--primary); font-size: 19px;
    font-family: var(--font-serif); font-weight: 400; letter-spacing: -0.015em;
  }
  .upgrade p { margin: 0 0 16px; color: var(--ink-soft); font-size: 13.5px; }
  .upgrade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 480px) { .upgrade-grid { grid-template-columns: 1fr; } }
  .pay-btn {
    display: flex; flex-direction: column; align-items: flex-start;
    padding: 13px 14px; border: 1px solid var(--bg-dark);
    border-radius: var(--radius-sm); background: #FFFFFF;
    color: var(--primary); text-decoration: none;
    transition: all var(--transition); gap: 2px;
  }
  .pay-btn:hover { border-color: var(--primary); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .pay-btn .region {
    font-family: var(--font-mono); font-size: 9.5px;
    color: var(--secondary); text-transform: uppercase;
    letter-spacing: 0.10em; font-weight: 700; margin-bottom: 2px;
  }
  .pay-btn .price {
    font-family: var(--font-mono); font-weight: 700; font-size: 14.5px;
    color: var(--primary); letter-spacing: -0.01em;
  }
  .pay-btn .label { color: var(--ink-soft); font-size: 12px; }

  .error-banner {
    background: var(--error-bg); color: var(--error);
    padding: 11px 14px; border-radius: var(--radius-sm);
    font-size: 13px; margin: 10px 0;
    border: 1px solid rgba(165, 63, 43, 0.20);
  }

  /* Radio (laser_pbm en módulos no-expediente) */
  .radio-group { display: flex; gap: 8px; }
  .radio-group label {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 11px; border: 1px solid var(--bg-dark);
    border-radius: var(--radius-sm); cursor: pointer;
    font-family: var(--font-mono); font-size: 12px;
    text-transform: none; letter-spacing: 0;
    color: var(--ink); margin: 0;
    background: var(--bg-soft); transition: all var(--transition);
  }
  .radio-group input[type="radio"] { display: none; }
  .radio-group input[type="radio"]:checked + span { color: var(--primary); font-weight: 700; }
  .radio-group label:has(input:checked) { border-color: var(--primary); background: var(--primary-5); }

  .hidden { display: none !important; }

  /* =====================================================
   * FASE 2 · Sistema de chips + acordeones (EXPEDIENTE)
   * ===================================================== */

  /* Accordion */
  .accordion {
    background: var(--bg-soft);
    border: 1px solid var(--bg-dark);
    border-radius: var(--radius-md);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color var(--transition);
  }
  .accordion.expanded { border-color: var(--sec-30); }
  .accordion-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; cursor: pointer; gap: 12px;
    user-select: none;
  }
  .accordion-head-left {
    display: flex; align-items: baseline; gap: 10px; flex: 0 0 auto; min-width: 0;
  }
  .accordion-num {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--secondary); font-weight: 700; letter-spacing: 0.05em;
  }
  .accordion-title {
    font-size: 14px; font-weight: 600; color: var(--ink);
    letter-spacing: -0.01em;
  }
  .accordion-summary {
    font-size: 12.5px; color: var(--ink-soft);
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    text-align: right; min-width: 0;
  }
  .accordion-summary.empty { color: var(--ink-mute); }
  .accordion-summary .edit {
    color: var(--secondary); text-transform: uppercase;
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.08em; margin-left: 8px; font-weight: 700;
  }
  .accordion.expanded .accordion-summary { display: none; }
  .accordion-toggle {
    font-family: var(--font-serif); font-size: 20px;
    color: var(--secondary); line-height: 1;
    transition: transform var(--transition);
    flex-shrink: 0;
  }
  .accordion.expanded .accordion-toggle { transform: rotate(90deg); color: var(--primary); }
  .accordion-body { padding: 0 16px 16px; display: none; }
  .accordion.expanded .accordion-body { display: block; }
  .accordion-divider { height: 1px; background: var(--bg-dark); margin: 4px 0 14px; }

  /* Field group inside accordion */
  .field-group { margin-bottom: 14px; }
  .field-group:last-child { margin-bottom: 0; }
  .field-group-label {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--ink-soft); text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 8px; font-weight: 700;
  }

  /* Chips base */
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 7px 13px; border-radius: var(--radius-pill);
    background: var(--bg); border: 1px solid var(--sec-30);
    color: var(--ink); font-size: 12.5px; font-weight: 500;
    cursor: pointer; transition: all 180ms ease;
    line-height: 1.2; user-select: none;
    font-family: var(--font-sans);
  }
  .chip:hover { background: var(--sec-10); border-color: var(--secondary); }
  .chip.active { background: var(--primary); color: var(--bg-soft); border-color: var(--primary); }
  .chip.compact { padding: 7px 11px; font-size: 12px; }

  /* Chip con abreviatura + expansión (stack vertical) */
  .chip-stack {
    padding: 5px 11px 6px;
    display: inline-flex; flex-direction: column; align-items: center;
    line-height: 1.05; gap: 1px;
  }
  .chip-stack .abbr {
    font-size: 12.5px; font-weight: 600; letter-spacing: -0.01em;
  }
  .chip-stack .full {
    font-size: 9px; color: var(--ink-mute);
    font-family: var(--font-mono); text-transform: lowercase;
    letter-spacing: 0; font-weight: 400;
  }
  .chip-stack.active .full { color: rgba(250, 247, 242, 0.65); }

  /* Chip de alerta (Bifosfonatos / ONJ) */
  .chip-alert {
    background: var(--warn-bg); border: 2px solid var(--warning);
    color: var(--ink); padding: 4px 11px 5px;
  }
  .chip-alert:hover { background: #F8E5CC; border-color: var(--warning); }
  .chip-alert.active { background: var(--warning); color: var(--bg-soft); border-color: var(--warning); }
  .chip-alert.active .full { color: rgba(250, 247, 242, 0.85); }
  .chip-alert .full { color: var(--warning); font-weight: 700; }
  .chip-alert .alert-tag {
    display: inline-block; font-family: var(--font-mono);
    font-size: 8.5px; background: var(--warning); color: var(--bg-soft);
    padding: 1px 5px; border-radius: 3px; margin-left: 4px;
    font-weight: 700; letter-spacing: 0.04em;
    vertical-align: middle; line-height: 1.1;
  }
  .chip-alert.active .alert-tag {
    background: var(--bg-soft); color: var(--warning);
  }

  .chip-more {
    background: transparent; border: 1px dashed var(--sec-30);
    color: var(--secondary); font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.02em;
  }
  .chip-more:hover { border-color: var(--secondary); background: var(--sec-10); }

  /* Chip "Exacto" con input */
  .chip-exact {
    background: var(--bg-soft); border: 1px solid var(--sec-30);
    color: var(--secondary); font-family: var(--font-mono);
    font-size: 11px; letter-spacing: 0.02em;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .chip-exact:hover { background: var(--sec-10); border-color: var(--secondary); }
  .chip-exact.has-value {
    background: var(--primary); color: var(--bg-soft); border-color: var(--primary);
  }
  .chip-exact input {
    width: 44px; background: transparent; border: none;
    border-bottom: 1px solid currentColor; color: inherit;
    font-family: var(--font-mono); font-size: 12px;
    text-align: center; padding: 0 2px; outline: none;
  }
  .chip-exact input::-webkit-inner-spin-button,
  .chip-exact input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

  /* Chip "Otro" con input inline expandible debajo */
  .otro-input-wrap {
    margin-top: 8px; display: none;
  }
  .otro-input-wrap.show { display: flex; gap: 6px; }
  .otro-input-wrap input {
    flex: 1; padding: 8px 11px;
    border: 1px solid var(--sec-30); border-radius: var(--radius-pill);
    background: var(--bg-soft); color: var(--ink);
    font-family: var(--font-sans); font-size: 12.5px;
    outline: none;
  }
  .otro-input-wrap input:focus { border-color: var(--primary); background: #FFFFFF; }

  /* IMC display */
  .imc-hint {
    font-size: 11.5px; color: var(--ink-mute);
    margin-top: 10px; font-style: italic; line-height: 1.3;
  }
  .imc-display {
    margin-top: 10px;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px; background: var(--sec-10);
    border: 1px solid var(--sec-30); border-radius: var(--radius-md);
  }
  .imc-display .imc-label {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--secondary); text-transform: uppercase;
    letter-spacing: 0.08em; font-weight: 700;
  }
  .imc-display .imc-value {
    font-family: var(--font-mono); font-size: 16px;
    color: var(--primary); font-weight: 700;
  }
  .imc-display .imc-cat { font-size: 11.5px; color: var(--ink-soft); }

  /* Medicamentos seleccionados list */
  .med-selected {
    display: flex; flex-direction: column; gap: 6px;
    margin-top: 6px;
  }
  .med-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; background: var(--bg);
    border: 1px solid var(--sec-30); border-radius: var(--radius-md);
  }
  .med-row-name {
    flex: 1; font-size: 13px; color: var(--ink); font-weight: 500;
  }
  .med-row-cat {
    font-family: var(--font-mono); font-size: 9.5px;
    color: var(--ink-mute); text-transform: uppercase;
    letter-spacing: 0.06em; margin-right: 8px;
  }
  .med-freq-btn {
    font-family: var(--font-mono); font-size: 11px;
    background: var(--primary-5); color: var(--primary);
    border: 1px solid var(--sec-30); border-radius: var(--radius-pill);
    padding: 4px 10px; cursor: pointer; font-weight: 700;
    letter-spacing: 0.01em;
    transition: all var(--transition);
  }
  .med-freq-btn:hover { background: var(--primary-10); }
  .med-row-remove {
    background: none; border: none;

    display: block; font-family: var(--font-mono);
    font-size: 10.5px; color: var(--primary);
    margin-bottom: 6px; letter-spacing: 0.08em;
    text-transform: uppercase; font-weight: 700;
  }
  .nota-complementaria textarea {
    width: 100%; min-height: 100px; padding: 12px 14px;
    border: 1px solid var(--bg-dark); border-radius: var(--radius-md);
    background: var(--bg-soft); color: var(--ink);
    font-family: var(--font-sans); font-size: 14px; line-height: 1.55;
    resize: vertical; outline: none;
    transition: border-color var(--transition), background var(--transition);
  }
  .nota-complementaria textarea::placeholder { color: var(--ink-mute); }
  .nota-complementaria textarea:focus { border-color: var(--primary); background: #FFFFFF; }

  /* =====================================================
   * FASE 2.1 · Sistema de resaltado clínico
   * (badges aplicados al output del agente vía
   *  applyClinicalHighlights() después de mdToHtml)
   * ===================================================== */

  /* Badges de cabecera de riesgo */
  .risk-high, .risk-warn, .risk-low {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 0.95em;
    letter-spacing: 0.01em;
  }
  .risk-high { background: var(--error-bg);   color: var(--error); }
  .risk-warn { background: var(--warn-bg);    color: var(--warning); }
  .risk-low  { background: var(--success-bg); color: var(--success); }

  /* Sub-labels de sección (texto coloreado, sin fondo) */
  .label-avoid { color: var(--error);   font-weight: 700; }
  .label-use   { color: var(--success); font-weight: 700; }
  .label-warn  { color: var(--warning); font-weight: 700; }

  /* Badges de decisión final (filled, fuertes) */
  .decision-go, .decision-adjust, .decision-stop {
    display: inline-block;
    padding: 6px 13px;
    border-radius: 5px;
    font-weight: 700;
    font-size: 0.98em;
    letter-spacing: 0.02em;
  }
  .decision-go     { background: var(--success-bg); color: var(--success); }
  .decision-adjust { background: var(--warn-bg);    color: var(--warning); }
  .decision-stop   { background: var(--error-bg);   color: var(--error); }

  /* Riesgo inline (la palabra alto/moderado/bajo en bullets de alertas) */
  .risk-inline-high { color: var(--error);   font-weight: 700; }
  .risk-inline-warn { color: var(--warning); font-weight: 700; }
  .risk-inline-low  { color: var(--success); font-weight: 700; }

  /* ===== Modo Revisión (toggle + chips) ===== */
  .review-toggle {
    margin: var(--space-4) 0 var(--space-2);
    padding: var(--space-3) var(--space-4);
    background: var(--bg-soft);
    border: 1px solid var(--bg-dark);
    border-radius: var(--radius-md);
    transition: border-color 150ms ease, background 150ms ease;
  }
  .review-toggle.is-on {
    background: var(--primary-5);
    border-color: var(--sec-30);
  }
  .review-toggle-row {
    display: flex;
    align-items: center;
    gap: var(--space-3);
  }
  .review-switch {
    position: relative;
    flex: 0 0 auto;
    width: 38px;
    height: 22px;
    background: var(--bg-dark);
    border-radius: 999px;
    cursor: pointer;
    transition: background 150ms ease;
  }
  .review-switch::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 18px; height: 18px;
    background: #fff;
    border-radius: 50%;
    box-shadow: var(--shadow-sm);
    transition: transform 150ms ease;
  }
  .review-toggle.is-on .review-switch { background: var(--primary); }
  .review-toggle.is-on .review-switch::after { transform: translateX(16px); }
  .review-label {
    flex: 1 1 auto;
    font-weight: 600;
    color: var(--ink);
    font-size: 0.95em;
    user-select: none;
  }
  .review-pill {
    flex: 0 0 auto;
    font-family: var(--font-mono);
    font-size: 0.72em;
    padding: 3px 8px;
    border-radius: 999px;
    background: var(--warn-bg);
    color: var(--warning);
    font-weight: 700;
    letter-spacing: 0.02em;
    border: 1px solid var(--warn-border);
    opacity: 0;
    transform: scale(0.92);
    transition: opacity 150ms ease, transform 150ms ease;
  }
  .review-toggle.is-on .review-pill { opacity: 1; transform: scale(1); }
  .review-caption {
    margin-top: var(--space-2);
    font-size: 0.82em;
    line-height: 1.45;
    color: var(--ink-soft);
  }
  .review-caption strong { color: var(--ink); font-weight: 600; }
  .review-caption .review-cost { color: var(--warning); font-weight: 700; font-family: var(--font-mono); }
  .review-toggle-hidden { display: none; }

  /* Chips de confirmación tras verificación */
  .review-chips {
    margin-top: var(--space-4);
    padding-top: var(--space-4);
    border-top: 1px dashed var(--bg-dark);
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
  }
  .review-chip {
    flex: 1 1 auto;
    min-width: 0;
    padding: 10px 16px;
    border-radius: var(--radius-md);

    cursor: pointer;
    transition: all 150ms ease;
    text-align: center;
    border: 1px solid;
  }
  .review-chip-primary {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  .review-chip-primary:hover { background: var(--ink); border-color: var(--ink); }
  .review-chip-secondary {
    background: transparent;
    color: var(--primary);
    border-color: var(--sec-30);
  }
  .review-chip-secondary:hover { background: var(--primary-5); border-color: var(--secondary); }

  /* -------- Interconsulta: banner de herencia desde Expediente -------- */
  .inter-heredado-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;

/* -------- Render: toggle Modo Revisión -------- */
function renderReviewToggle() {
  const container = document.getElementById('review-toggle-container');
  if (!container) return;
  // Solo en setup inicial (antes de que se use el primer crédito de la sesión)
  if (state.sessionCreditUsed || !state.module) {
    container.className = 'review-toggle-hidden';
    container.innerHTML = '';
    return;
  }
  const R = t().review;
  if (!R) { container.className = 'review-toggle-hidden'; return; }

  container.className = 'review-toggle' + (state.reviewMode ? ' is-on' : '');
  container.innerHTML = `
    <div class="review-toggle-row">
      <div id="review-switch" class="review-switch" role="switch" aria-checked="${state.reviewMode}" tabindex="0"></div>
      <div class="review-label">${escapeHtml(R.label)}</div>
      <div class="review-pill">${escapeHtml(R.caption_cost)}</div>
    </div>
    <div class="review-caption">
      <strong>${escapeHtml(R.caption_strong)}</strong>${escapeHtml(R.caption_rest)} <span class="review-cost">${escapeHtml(R.caption_cost)}</span>.
    </div>
  `;
  const sw = document.getElementById('review-switch');
  const toggle = () => {
    state.reviewMode = !state.reviewMode;
    renderReviewToggle();
  };
  sw.addEventListener('click', toggle);
  sw.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
  });
  // Click en el row también activa (UX más generosa)
  container.querySelector('.review-toggle-row').addEventListener('click', e => {
    if (e.target === sw || sw.contains(e.target)) return;
    toggle();
  });
}

/* -------- Render: chips de confirmación tras turno 1 -------- */
function renderReviewChips(targetEl) {
  if (!targetEl) return;
  const R = t().review;
  if (!R) return;
  const wrap = document.createElement('div');
  wrap.className = 'review-chips';
  wrap.innerHTML = `
    <button type="button" class="review-chip review-chip-primary" id="review-chip-confirm">${escapeHtml(R.chip_confirm)}</button>
    <button type="button" class="review-chip review-chip-secondary" id="review-chip-correct">${escapeHtml(R.chip_correct)}</button>
  `;
  targetEl.appendChild(wrap);

  document.getElementById('review-chip-confirm').addEventListener('click', () => {
    // Quitar chips para evitar doble click
    wrap.remove();
    state.reviewTurn = 2;
    submitQuery(R.confirm_message, { isFollowup: true });
  });
  document.getElementById('review-chip-correct').addEventListener('click', () => {
    // Quitar chips, mostrar área de follow-up con placeholder de corrección
    wrap.remove();
    state.reviewTurn = 2;
    show('followup');
    const input = document.getElementById('chat-input');
    if (input) {
      input.placeholder = R.correct_placeholder;
      input.focus();
      input.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  });
}

function renderField(fieldName) {
  const L = t().fields;
  const wrap = document.createElement('div');
  wrap.className = 'field';
  const label = document.createElement('label');
  label.textContent = L[fieldName] || fieldName;
  label.setAttribute('for', 'f-' + fieldName);
  wrap.appendChild(label);

  if (fieldName === 'laser_pbm') {
    const group = document.createElement('div');
    group.className = 'radio-group';
    ['yes', 'no'].forEach((val, i) => {
      const lbl = document.createElement('label');
      const input = document.createElement('input');
      input.type = 'radio'; input.name = 'laser_pbm';
      input.value = val === 'yes' ? 'Sí' : 'No';
      if (i === 1) input.checked = true;
      input.addEventListener('change', () => { state.formData.laser_pbm = input.value; });
      const sp = document.createElement('span');
      sp.textContent = L[val];
      lbl.appendChild(input); lbl.appendChild(sp); group.appendChild(lbl);
    });
    state.formData.laser_pbm = 'No';
    wrap.appendChild(group);
    return wrap;
  }

  const isTextarea = ['query', 'HistClin', 'medstomando', 'receta', 'condicion', 'objetivo_PBM'].includes(fieldName);
  const isNumber = fieldName === 'peso_paciente';
  const input = document.createElement(isTextarea ? 'textarea' : 'input');
  if (!isTextarea) input.type = isNumber ? 'number' : 'text';
  input.id = 'f-' + fieldName;
  const phMap = {
    query: L.query_ph, nombre_paciente: L.nombre_paciente_ph, HistClin: L.HistClin_ph,
    procedimiento: L.procedimiento_ph, anestesia: L.anestesia_ph, medstomando: L.medstomando_ph,
    receta: L.receta_ph, objetivo_PBM: L.objetivo_PBM_ph, dispositivo_laser: L.dispositivo_laser_ph,
    area_tratamiento: L.area_tratamiento_ph,
  };
  if (phMap[fieldName]) input.placeholder = phMap[fieldName];
  input.addEventListener('input', () => { state.formData[fieldName] = input.value; });
  wrap.appendChild(input);
  return wrap;
}

function restoreExpedienteValues() {
  const e = state.expData;
  if (e.nombre) document.getElementById('exp-nombre').value = e.nombre;
  if (e.receta) document.getElementById('exp-receta').value = e.receta;
  if (e.nota)   document.getElementById('exp-nota').value = e.nota;
  if (e.pbmIndicacionOtro) {
    const inp = document.getElementById('otro-pbm-indicacion-input');
    if (inp) inp.value = e.pbmIndicacionOtro;
  }
  if (e.pbmDispositivoOtro) {
    const inp = document.getElementById('otro-pbm-dispositivo-input');
    if (inp) inp.value = e.pbmDispositivoOtro;
  }
}

function bindExpedienteEvents() {
  document.getElementById('exp-nombre').addEventListener('input', ev => { state.expData.nombre = ev.target.value; });
  document.getElementById('exp-receta').addEventListener('input', ev => { state.expData.receta = ev.target.value; });
  document.getElementById('exp-nota').addEventListener('input', ev => { state.expData.nota = ev.target.value; });

  document.querySelectorAll('[data-acc-head]').forEach(head => {
    head.addEventListener('click', () => setAccordionOpen(head.dataset.accHead));
  });

  document.querySelectorAll('input[name="exp-pbm"]').forEach(r => {
    r.addEventListener('change', ev => {
      state.expData.usaPBM = ev.target.value === 'Sí';
      document.getElementById('pbm-details').classList.toggle('hidden', !state.expData.usaPBM);
      refreshAllSummaries();
    });
  });

  /* Otro inputs PBM */
  bindOtroInput('otro-pbm-indicacion-input', val => {
    state.expData.pbmIndicacionOtro = val.trim();
    refreshAllSummaries();
  });
  bindOtroInput('otro-pbm-dispositivo-input', val => {
    state.expData.pbmDispositivoOtro = val.trim();
    refreshAllSummaries();
  });

  /* Otro inputs */
  bindOtroInput('otro-antecedentes-input', val => {
    state.expData.condicionesOtro = val.trim();
    refreshAllSummaries();
  });
  bindOtroInput('otro-med-input', val => {
    state.expData.medOtro = val.trim();
  });
  bindOtroInput('otro-proc-input', val => {
    state.expData.procOtro = val.trim();
    refreshAllSummaries();
  });
  bindOtroInput('otro-anestesia-input', val => {
    state.expData.anestesiaOtro = val.trim();
    refreshAllSummaries();
  });
}

function bindOtroInput(id, cb) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('input', ev => cb(ev.target.value));
}

function setAccordionOpen(name) {
  state.expData.accordionOpen = name;
  document.querySelectorAll('[data-acc]').forEach(a => {
    a.classList.toggle('expanded', a.dataset.acc === name);
  });
}

/* -------- Render chips -------- */
function renderAllExpedienteChips() {
  renderRangeChips('chips-genero', CHIPS_DATA.genero, 'genero', false);
  renderRangeWithExact('chips-edad', CHIPS_DATA.edad, 'edadRango', 'edadExacto', '');
  renderRangeWithExact('chips-peso', CHIPS_DATA.peso, 'pesoRango', 'pesoExacto', 'kg');
  renderRangeWithExact('chips-talla', CHIPS_DATA.talla, 'tallaRango', 'tallaExacto', 'cm');
  renderAntecedentesChips();
  renderMedCategorias();
  renderMedSubs();
  renderMedSelected();
  renderProcEspecialidades();
  renderProcSubs();
  renderAnestesiaChips();
  renderPBMMecanismoChips();
  renderPBMIndicacionChips();
  renderPBMDispositivoChips();
  refreshIMC();
}

function renderRangeChips(containerId, values, stateKey, withExact) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  values.forEach(v => {
    const chip = document.createElement('button');
    chip.className = 'chip compact';
    chip.textContent = v;
    chip.dataset.value = v;
    if (state.expData[stateKey] === v) chip.classList.add('active');
    chip.addEventListener('click', () => {
      state.expData[stateKey] = state.expData[stateKey] === v ? '' : v;
      renderRangeChips(containerId, values, stateKey, withExact);
      refreshAllSummaries();
    });
    container.appendChild(chip);
  });
}

function renderRangeWithExact(containerId, values, rangoKey, exactoKey, unit) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  values.forEach(v => {
    const chip = document.createElement('button');
    chip.className = 'chip compact';
    chip.textContent = v;
    if (state.expData[rangoKey] === v && !state.expData[exactoKey]) chip.classList.add('active');
    chip.addEventListener('click', () => {
      state.expData[rangoKey] = state.expData[rangoKey] === v ? '' : v;
      state.expData[exactoKey] = '';
      renderRangeWithExact(containerId, values, rangoKey, exactoKey, unit);
      refreshIMC();
      refreshAllSummaries();
    });
    container.appendChild(chip);
  });

  // Exacto chip
  const exact = document.createElement('button');
  exact.className = 'chip-exact chip compact';
  if (state.expData[exactoKey]) exact.classList.add('has-value');
  const exactLabel = (state.language === 'es' || state.language === 'pt') ? 'Exacto'
                   : (state.language === 'ja') ? '正確'
                   : (state.language === 'ko') ? '정확'
                   : 'Exact';
  const unitSuffix = unit ? ` ${unit}` : '';
  exact.innerHTML = `${exactLabel} <input type="number" min="0" />${unitSuffix}`;
  const input = exact.querySelector('input');
  input.value = state.expData[exactoKey] || '';
  input.addEventListener('click', e => e.stopPropagation());
  input.addEventListener('input', () => {
    state.expData[exactoKey] = input.value;
    if (input.value) state.expData[rangoKey] = '';
    exact.classList.toggle('has-value', !!input.value);
    document.querySelectorAll(`#${containerId} .chip`).forEach(c => {
      if (!c.classList.contains('chip-exact')) c.classList.remove('active');
    });
    refreshIMC();
    refreshAllSummaries();
  });
  exact.addEventListener('click', () => input.focus());
  container.appendChild(exact);
}

function renderAntecedentesChips() {
  const container = document.getElementById('chips-antecedentes');
  if (!container) return;
  container.innerHTML = '';
  const e = state.expData;
  const visibles = CHIPS_DATA.condiciones.filter(c => c.visible);
  const hidden = CHIPS_DATA.condiciones.filter(c => !c.visible);
  const items = e.antecedentesShowMore ? CHIPS_DATA.condiciones : visibles;

  items.forEach(cond => {
    const chip = document.createElement('button');
    chip.className = 'chip chip-stack';
    if (cond.alert) chip.classList.add('chip-alert');
    if (e.condiciones.includes(cond.abbr)) chip.classList.add('active');
    const fullSpan = cond.full ? `<span class="full">${cond.full}</span>` : '';
    const alertTag = cond.alert ? `<span class="alert-tag">${cond.alert}</span>` : '';
    chip.innerHTML = `<span class="abbr">${cond.abbr}${alertTag}</span>${fullSpan}`;
    chip.addEventListener('click', () => {
      const idx = e.condiciones.indexOf(cond.abbr);
      if (idx >= 0) e.condiciones.splice(idx, 1);
      else e.condiciones.push(cond.abbr);
      renderAntecedentesChips();
      refreshAllSummaries();
    });
    container.appendChild(chip);
  });

  if (!e.antecedentesShowMore && hidden.length > 0) {
    const more = document.createElement('button');
    more.className = 'chip chip-more';
    more.textContent = `+ ${hidden.length} ${t().exp.mas}`;
    more.addEventListener('click', () => {
      e.antecedentesShowMore = true;
      renderAntecedentesChips();
    });
    container.appendChild(more);
  }

  // Otro chip
  const otroChip = document.createElement('button');
  otroChip.className = 'chip chip-more';
  otroChip.textContent = t().exp.otro;
  if (e.condicionesOtro) otroChip.classList.add('active');
  const otroWrap = document.getElementById('otro-antecedentes-wrap');
  otroChip.addEventListener('click', () => {
    otroWrap.classList.toggle('show');
    if (otroWrap.classList.contains('show')) {
      document.getElementById('otro-antecedentes-input').focus();
    }
  });
  container.appendChild(otroChip);

  // Set Otro input value if any
  const otroInput = document.getElementById('otro-antecedentes-input');
  if (otroInput && e.condicionesOtro && !otroInput.value) otroInput.value = e.condicionesOtro;
  if (e.condicionesOtro) otroWrap.classList.add('show');
}

function renderMedCategorias() {
  const container = document.getElementById('chips-med-cats');
  if (!container) return;
  container.innerHTML = '';
  const e = state.expData;
  CHIPS_DATA.medCategorias.forEach(cat => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = cat;
    if (e.medActiveCat === cat) chip.classList.add('active');
    chip.addEventListener('click', () => {
      e.medActiveCat = e.medActiveCat === cat ? '' : cat;
      e.medOtro = '';
      renderMedCategorias();
      renderMedSubs();
    });
    container.appendChild(chip);
  });
}

function renderMedSubs() {
  const wrap = document.getElementById('med-subs-wrap');
  const container = document.getElementById('chips-med-subs');
  const label = document.getElementById('med-subs-label');
  if (!wrap || !container) return;
  const e = state.expData;
  if (!e.medActiveCat) {
    wrap.classList.add('hidden');
    return;
  }
  wrap.classList.remove('hidden');
  label.textContent = e.medActiveCat;
  container.innerHTML = '';
  const subs = CHIPS_DATA.medSubs[e.medActiveCat] || [];
  subs.forEach(name => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = name;
    // Already selected in this cat?
    if (e.meds.find(m => m.cat === e.medActiveCat && m.name === name)) chip.classList.add('active');
    chip.addEventListener('click', () => {
      const existingIdx = e.meds.findIndex(m => m.cat === e.medActiveCat && m.name === name);
      if (existingIdx >= 0) {
        e.meds.splice(existingIdx, 1);
      } else {
        const defFreq = e.medActiveCat === 'Bifosfonatos' ? 'Semanal' : 'c/8h';
        e.meds.push({ cat: e.medActiveCat, name, freq: defFreq });
      }
      renderMedSubs();
      renderMedSelected();
      refreshAllSummaries();
    });
    container.appendChild(chip);
  });
  // Otro
  const otro = document.createElement('button');
  otro.className = 'chip chip-more';
  otro.textContent = t().exp.otro;
  const otroWrap = document.getElementById('otro-med-wrap');
  otro.addEventListener('click', () => {
    otroWrap.classList.toggle('show');
    if (otroWrap.classList.contains('show')) {
      document.getElementById('otro-med-input').focus();
    }
  });
  container.appendChild(otro);
  // Add med via Enter on Otro input
  const otroInput = document.getElementById('otro-med-input');
  if (otroInput) {
    otroInput.onkeydown = ev => {
      if (ev.key === 'Enter') {
        ev.preventDefault();
        const v = otroInput.value.trim();
        if (v && e.medActiveCat) {
          const defFreq = e.medActiveCat === 'Bifosfonatos' ? 'Semanal' : 'c/8h';
          e.meds.push({ cat: e.medActiveCat, name: v, freq: defFreq });
          otroInput.value = '';
          renderMedSelected();
          refreshAllSummaries();
        }
      }
    };
  }
}

function renderMedSelected() {
  const wrap = document.getElementById('med-selected-wrap');
  const container = document.getElementById('med-selected');
  if (!wrap || !container) return;
  const e = state.expData;
  if (e.meds.length === 0) {
    wrap.classList.add('hidden');
    return;
  }
  wrap.classList.remove('hidden');
  container.innerHTML = '';
  e.meds.forEach((m, idx) => {
    const row = document.createElement('div');
    row.className = 'med-row';
    row.innerHTML = `
      <span class="med-row-cat">${m.cat.split('/')[0].slice(0,12)}</span>
      <span class="med-row-name">${m.name}</span>
      <button class="med-freq-btn" type="button">${m.freq}</button>
      <button class="med-row-remove" type="button" title="Quitar">×</button>
    `;
    const freqBtn = row.querySelector('.med-freq-btn');
    freqBtn.addEventListener('click', () => {
      const f = CHIPS_DATA.frecuencias;
      const i = f.indexOf(m.freq);
      m.freq = f[(i + 1) % f.length];
      freqBtn.textContent = m.freq;
      refreshAllSummaries();
    });
    row.querySelector('.med-row-remove').addEventListener('click', () => {
      e.meds.splice(idx, 1);
      renderMedSubs();
      renderMedSelected();
      refreshAllSummaries();
    });
    container.appendChild(row);
  });
}

function renderProcEspecialidades() {
  const container = document.getElementById('chips-proc-specs');
  if (!container) return;
  container.innerHTML = '';
  const e = state.expData;
  CHIPS_DATA.procEspecialidades.forEach(spec => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = spec;
    if (e.procSpec === spec) chip.classList.add('active');
    chip.addEventListener('click', () => {
      if (e.procSpec === spec) {
        e.procSpec = ''; e.procSub = '';
      } else {
        e.procSpec = spec; e.procSub = '';
      }
      e.procOtro = '';
      renderProcEspecialidades();
      renderProcSubs();
      refreshAllSummaries();
    });
    container.appendChild(chip);
  });
}

function renderProcSubs() {
  const wrap = document.getElementById('proc-subs-wrap');

  if (!wrap || !container) return;
  const e = state.expData;
  if (!e.procSpec) { wrap.classList.add('hidden'); return; }
  wrap.classList.remove('hidden');
  container.innerHTML = '';
  const subs = CHIPS_DATA.procSubs[e.procSpec] || [];
  subs.forEach(s => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = s;
    if (e.procSub === s) chip.classList.add('active');
    chip.addEventListener('click', () => {
      e.procSub = e.procSub === s ? '' : s;
      e.procOtro = '';
      renderProcSubs();
      refreshAllSummaries();
    });

/* -------- PBM chips (multi-select) -------- */

function renderPBMMecanismoChips() {
  const container = document.getElementById('chips-pbm-mecanismo');
  if (!container) return;
  container.innerHTML = '';
  const e = state.expData;
  CHIPS_DATA.pbmMecanismos.forEach(mec => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = mec;
    if (e.pbmMecanismos.includes(mec)) chip.classList.add('active');
    chip.addEventListener('click', () => {
      const idx = e.pbmMecanismos.indexOf(mec);
      if (idx >= 0) {
        e.pbmMecanismos.splice(idx, 1);
        // Al deseleccionar un mecanismo, quitar indicaciones que ya no son válidas
        const stillValid = new Set();
        e.pbmMecanismos.forEach(m => (CHIPS_DATA.pbmIndicacionesByMec[m] || []).forEach(i => stillValid.add(i)));
        e.pbmIndicaciones = e.pbmIndicaciones.filter(ind => stillValid.has(ind));
      } else {
        e.pbmMecanismos.push(mec);
      }
      renderPBMMecanismoChips();
      renderPBMIndicacionChips();
      refreshAllSummaries();
    });
    container.appendChild(chip);
  });
}

function renderPBMIndicacionChips() {
  const container = document.getElementById('chips-pbm-indicacion');
  const wrap = document.getElementById('pbm-indicacion-wrap');
  const otroWrap = document.getElementById('otro-pbm-indicacion-wrap');
  if (!container || !wrap) return;
  container.innerHTML = '';
  const e = state.expData;

  if (e.pbmMecanismos.length === 0) {
    wrap.classList.add('hidden');
    return;
  }
  wrap.classList.remove('hidden');

  // Unir todas las indicaciones de los mecanismos seleccionados, deduplicando
  // Sacar 'Otro' al final
  const indicacionesSet = new Set();
  e.pbmMecanismos.forEach(mec => {
    (CHIPS_DATA.pbmIndicacionesByMec[mec] || []).forEach(ind => indicacionesSet.add(ind));
  });
  const indicaciones = [...indicacionesSet].filter(i => i !== 'Otro');
  const hasOtro = indicacionesSet.has('Otro');

  indicaciones.forEach(ind => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = ind;
    if (e.pbmIndicaciones.includes(ind)) chip.classList.add('active');
    chip.addEventListener('click', () => {
      const idx = e.pbmIndicaciones.indexOf(ind);
      if (idx >= 0) e.pbmIndicaciones.splice(idx, 1);
      else e.pbmIndicaciones.push(ind);
      renderPBMIndicacionChips();
      refreshAllSummaries();
    });
    container.appendChild(chip);
  });

  if (hasOtro) {
    const otro = document.createElement('button');
    otro.className = 'chip chip-more';
    otro.textContent = t().exp.otro;
    if (e.pbmIndicacionOtro) otro.classList.add('active');
    otro.addEventListener('click', () => {
      otroWrap.classList.toggle('show');
      if (otroWrap.classList.contains('show')) {
        const inp = document.getElementById('otro-pbm-indicacion-input');
        if (inp) inp.focus();
      }
    });
    container.appendChild(otro);
    const otroInput = document.getElementById('otro-pbm-indicacion-input');
    if (otroInput && e.pbmIndicacionOtro && !otroInput.value) otroInput.value = e.pbmIndicacionOtro;
    if (e.pbmIndicacionOtro) otroWrap.classList.add('show');
  }

/* -------- IMC -------- */
function imcCategory(imc) {
  if (imc < 18.5) return 'bajo peso';
  if (imc < 25) return 'normal';
  if (imc < 30) return 'sobrepeso';
  if (imc < 35) return 'obesidad grado I';
  if (imc < 40) return 'obesidad grado II';
  return 'obesidad grado III';
}

function refreshIMC() {
  const e = state.expData;
  const hint = document.getElementById('imc-hint');
  const disp = document.getElementById('imc-display');
  const val = document.getElementById('imc-value');
  const cat = document.getElementById('imc-cat');
  if (!hint || !disp) return;
  const peso = parseFloat(e.pesoExacto);
  const talla = parseFloat(e.tallaExacto);
  if (!peso || !talla || talla < 50) {
    disp.classList.add('hidden');
    hint.classList.remove('hidden');
    return;
  }
  const m = talla / 100;
  const imc = peso / (m * m);
  val.textContent = imc.toFixed(1);
  cat.textContent = imcCategory(imc);
  disp.classList.remove('hidden');
  hint.classList.add('hidden');
}

/* -------- Summaries -------- */
function refreshAllSummaries() {
  setSummary('paciente', summaryPaciente());
  setSummary('antecedentes', summaryAntecedentes());
  setSummary('medicamentos', summaryMedicamentos());
  setSummary('procedimiento', summaryProcedimiento());
  setSummary('anestesia', summaryAnestesia());
  setSummary('pbm', summaryPBM());
}

function setSummary(name, text) {
  const el = document.querySelector(`[data-acc-summary="${name}"]`);
  if (!el) return;
  if (!text) {
    el.textContent = t().exp.empty_summary;
    el.classList.add('empty');
  } else {
    el.innerHTML = text;
    el.classList.remove('empty');
  }
}

function summaryPaciente() {
  const e = state.expData;
  const parts = [];
  if (e.genero) parts.push(e.genero);
  if (e.edadExacto) parts.push(`${e.edadExacto}a`);
  else if (e.edadRango) parts.push(`${e.edadRango}a`);
  if (e.pesoExacto) parts.push(`${e.pesoExacto}kg`);
  else if (e.pesoRango) parts.push(e.pesoRango);
  if (e.tallaExacto) parts.push(`${e.tallaExacto}cm`);
  else if (e.tallaRango) parts.push(e.tallaRango);
  return parts.join(' · ');
}

function summaryAntecedentes() {
  const e = state.expData;
  const items = [...e.condiciones];
  if (e.condicionesOtro) items.push(e.condicionesOtro);
  return items.length > 0 ? items.join(', ') : '';
}

function summaryMedicamentos() {
  const e = state.expData;
  if (e.meds.length === 0) return '';
  return e.meds.map(m => `${m.name} ${m.freq}`).join(', ');
}

function summaryProcedimiento() {
  const e = state.expData;
  if (!e.procSpec) return '';
  let s = e.procSpec;
  if (e.procOtro) s += ` — ${e.procOtro}`;
  else if (e.procSub) s += ` — ${e.procSub}`;
  return s;
}

function summaryAnestesia() {
  const e = state.expData;
  const parts = [...e.anestesicos];
  if (e.anestesiaOtro) parts.push(e.anestesiaOtro);
  return parts.join(', ');
}

function summaryPBM() {
  const e = state.expData;
  if (!e.usaPBM) return '';
  const parts = ['Sí'];

  // Mecanismos seleccionados
  if (e.pbmMecanismos.length > 0) {
    parts.push(e.pbmMecanismos.join(', '));
  }

  // Indicaciones (incluye Otro si tiene texto)
  const inds = [...e.pbmIndicaciones];
  if (e.pbmIndicacionOtro) inds.push(e.pbmIndicacionOtro);
  if (inds.length > 0) {
    const joined = inds.join(', ');
    parts.push(joined.length > 40 ? joined.slice(0, 40) + '…' : joined);
  }

  // Dispositivos (incluye Otro si tiene texto)
  const disps = [...e.pbmDispositivos];
  if (e.pbmDispositivoOtro) disps.push(e.pbmDispositivoOtro);
  if (disps.length > 0) {
    const joined = disps.join(', ');
    parts.push(joined.length > 35 ? joined.slice(0, 35) + '…' : joined);
  }

  return parts.join(' · ');
}

/* -------- Build payload for Expediente -------- */
function buildExpedienteFormData() {
  const e = state.expData;

  // Paciente
  const patientParts = [];
  if (e.genero) patientParts.push(e.genero);
  if (e.edadExacto) patientParts.push(`${e.edadExacto} años`);
  else if (e.edadRango) patientParts.push(`${e.edadRango} años`);
  if (e.pesoExacto) patientParts.push(`${e.pesoExacto} kg`);
  else if (e.pesoRango) patientParts.push(`peso ${e.pesoRango}`);
  if (e.tallaExacto) patientParts.push(`${e.tallaExacto} cm`);
  else if (e.tallaRango) patientParts.push(`talla ${e.tallaRango}`);

  let pacienteLine = '';
  if (patientParts.length > 0) pacienteLine = 'Paciente: ' + patientParts.join(', ') + '.';

  // IMC
  let imcSuffix = '';
  const p = parseFloat(e.pesoExacto), tt = parseFloat(e.tallaExacto);
  if (p && tt && tt >= 50) {
    const m = tt / 100;
    const imc = p / (m * m);
    imcSuffix = ` IMC ${imc.toFixed(1)} (${imcCategory(imc)}).`;
  }

  // Antecedentes
  const condItems = [...e.condiciones];
  if (e.condicionesOtro) condItems.push(e.condicionesOtro);
  let antLine = '';
  if (condItems.length > 0) {
    const formatted = condItems.map(c => c === 'Bifosfonatos' ? 'Bifosfonatos (riesgo ONJ)' : c);
    antLine = 'Antecedentes: ' + formatted.join(', ') + '.';
  }

  // HistClin = paciente + IMC + antecedentes + nota
  const histParts = [];
  if (pacienteLine) histParts.push(pacienteLine + imcSuffix);
  if (antLine) histParts.push(antLine);
  if ((e.nota || '').trim()) histParts.push('Nota del doctor: ' + e.nota.trim());
  state.formData.HistClin = histParts.join(' ');

  // medstomando — limpia paréntesis de frecuencia para evitar duplicar ("Alendronato (semanal) Semanal")
  state.formData.medstomando = e.meds.map(m => {
    const cleanName = m.name.replace(/\s*\((semanal|mensual|diario|c\/\d+h)\)\s*/i, '').trim();
    return `${cleanName} ${m.freq}`;
  }).join(', ');

  // procedimiento
  let procStr = '';
  if (e.procSpec) {
    procStr = e.procSpec;
    if (e.procOtro) procStr += ' — ' + e.procOtro;
    else if (e.procSub) procStr += ' — ' + e.procSub;
  }
  state.formData.procedimiento = procStr;

  // anestesia
  const anestesicos = [...e.anestesicos];
  if (e.anestesiaOtro) anestesicos.push(e.anestesiaOtro);
  state.formData.anestesia = anestesicos.join(', ');

  // receta
  state.formData.receta = (e.receta || '').trim();

  // PBM
  // PBM: construir strings legibles desde arrays multi-select
  state.formData.laser_pbm = e.usaPBM ? 'Sí' : 'No';
  if (e.usaPBM) {
    // objetivo_PBM = "Mecanismos: Analgesia, Antiinflamatorio. Indicaciones: Dolor postop, Mucositis, Periodontitis. Otro: <texto libre si aplica>"
    const objParts = [];
    if (e.pbmMecanismos.length > 0) {
      objParts.push('Mecanismos: ' + e.pbmMecanismos.join(', '));
    }
    const inds = [...e.pbmIndicaciones];
    if (e.pbmIndicacionOtro) inds.push(e.pbmIndicacionOtro.trim());
    if (inds.length > 0) {
      objParts.push('Indicaciones: ' + inds.join(', '));
    }
    state.formData.objetivo_PBM = objParts.join('. ');

    // dispositivo_laser = "660 nm (diodo rojo), 810 nm (diodo IR). Otro: <texto libre>"
    const disps = [...e.pbmDispositivos];
    if (e.pbmDispositivoOtro) disps.push(e.pbmDispositivoOtro.trim());
    state.formData.dispositivo_laser = disps.join(', ');
  } else {
    state.formData.objetivo_PBM = '';
    state.formData.dispositivo_laser = '';
  }

  // Nombre
  state.formData.nombre_paciente = (e.nombre || '').trim();
}

  refreshAllSummaries();           // del Expediente

function renderInterEspChips() {
  const container = document.getElementById('chips-inter-esp');
  if (!container) return;
  container.innerHTML = '';
  const i = state.interData;
  INTER_DATA.especialidades.forEach(esp => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = esp.label;
    if (i.especialidad === esp.key) chip.classList.add('active');
    chip.addEventListener('click', () => {
      if (i.especialidad === esp.key) {
        // Click sobre el chip activo: deseleccionar todo
        i.especialidad = '';
        i.motivo = '';
        i.motivoOtro = '';
      } else {
        i.especialidad = esp.key;
        i.motivo = '';
        i.motivoOtro = '';
      }
      renderInterEspChips();
      renderInterMotivoChips();
      refreshInterAllSummaries();
    });
    container.appendChild(chip);
  });
}

function renderInterMotivoChips() {
  const container = document.getElementById('chips-inter-motivo');
  const wrap = document.getElementById('inter-motivo-wrap');
  const otroWrap = document.getElementById('otro-inter-motivo-wrap');
  if (!container || !wrap) return;
  container.innerHTML = '';
  const i = state.interData;

  if (!i.especialidad) {
    wrap.classList.add('hidden');
    return;
  }
  wrap.classList.remove('hidden');

  // Caso especial: si especialidad === 'otro', NO mostramos chips de motivo,
  // mostramos directo el textarea para que el doctor escriba especialidad + motivo libre.
  if (i.especialidad === 'otro') {
    // Auto-marcamos motivo='Otro' internamente para que la validación pase con solo motivoOtro
    i.motivo = 'Otro';
    // Actualizar label del field-group y placeholder del input
    const labelEl = wrap.querySelector('.field-group-label');
    if (labelEl) labelEl.textContent = t().inter.lbl_motivo_otro_label;
    const inp = document.getElementById('otro-inter-motivo-input');
    if (inp) inp.placeholder = t().inter.lbl_especialidad_libre_ph;
    otroWrap.classList.add('show');
    setTimeout(() => {
      if (inp && document.activeElement !== inp) inp.focus();
    }, 50);
    return;
  }

  // Caso normal: restaurar label y placeholder por defecto
  const labelEl = wrap.querySelector('.field-group-label');
  if (labelEl) labelEl.textContent = t().inter.lbl_motivo;
  const inpRestore = document.getElementById('otro-inter-motivo-input');
  if (inpRestore) inpRestore.placeholder = t().inter.lbl_motivo_otro_ph;

  const esp = INTER_DATA.especialidades.find(e => e.key === i.especialidad);
  if (!esp) return;

  esp.motivos.forEach(motivo => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = motivo;
    if (i.motivo === motivo) chip.classList.add('active');
    chip.addEventListener('click', () => {
      i.motivo = i.motivo === motivo ? '' : motivo;
      // Si elige "Otro", mostrar input; si elige otro distinto, ocultar
      if (i.motivo === 'Otro') {
        otroWrap.classList.add('show');
        setTimeout(() => {
          const inp = document.getElementById('otro-inter-motivo-input');
          if (inp) inp.focus();
        }, 50);
      } else {
        otroWrap.classList.remove('show');
        i.motivoOtro = '';
        const inp = document.getElementById('otro-inter-motivo-input');
        if (inp) inp.value = '';
      }
      renderInterMotivoChips();
      refreshInterAllSummaries();
    });
    container.appendChild(chip);
  });

  // Si ya estaba en "Otro", mostrar wrap
  if (i.motivo === 'Otro') otroWrap.classList.add('show');
  else otroWrap.classList.remove('show');
}

function refreshInterAllSummaries() {
  const i = state.interData;

  // Destino summary (01)
  const destSum = document.querySelector('[data-inter-acc-summary="destino"]');
  if (destSum) {
    const parts = [];
    if (i.especialidad === 'otro') {
      // En el caso "Otro", lo que el doctor escribió es la especialidad libre completa
      const libre = (i.motivoOtro || '').trim();
      if (libre) {
        parts.push(libre.length > 50 ? libre.slice(0, 50) + '…' : libre);
      } else {
        parts.push('Otro');
      }
    } else if (i.especialidad) {
      const esp = INTER_DATA.especialidades.find(e => e.key === i.especialidad);
      if (esp) parts.push(esp.label);
      if (i.motivo) {
        const motivoText = i.motivo === 'Otro' && i.motivoOtro ? i.motivoOtro : i.motivo;
        parts.push(motivoText);
      }
    }
    destSum.textContent = parts.length > 0 ? parts.join(' · ') : t().exp.empty_summary;
    destSum.classList.toggle('empty', parts.length === 0);
  }

  // Pregunta summary (08)
  const preguntaSum = document.querySelector('[data-inter-acc-summary="pregunta"]');
  if (preguntaSum) {
    const parts = [];
    if (i.tipoPregunta) parts.push(i.tipoPregunta);
    if ((i.preguntaTexto || '').trim()) {
      const txt = i.preguntaTexto.trim();
      parts.push(txt.length > 40 ? txt.slice(0, 40) + '…' : txt);
    }
    preguntaSum.textContent = parts.length > 0 ? parts.join(' · ') : t().exp.empty_summary;
    preguntaSum.classList.toggle('empty', parts.length === 0);
  }
}

function buildInterconsultaFormData() {
  const i = state.interData;

  // 1. Caso clínico viene del Expediente (única fuente de verdad).
  buildExpedienteFormData();

  // 2. Arma especialidad destino y motivo legibles.
  //    Caso especial: si el usuario eligió "Otro" como especialidad, todo el texto
  //    libre que escribió (motivoOtro) se interpreta como la ESPECIALIDAD destino,
  //    y motivo_interconsulta queda vacío (el agente lo infiere del texto).
  let especialidadLabel = '';
  let motivoLabel = '';
  if (i.especialidad === 'otro') {
    especialidadLabel = (i.motivoOtro || '').trim() || 'Otro';
    motivoLabel = '';
  } else if (i.especialidad) {
    const esp = INTER_DATA.especialidades.find(e => e.key === i.especialidad);
    if (esp) especialidadLabel = esp.label;
    if (i.motivo === 'Otro' && i.motivoOtro) motivoLabel = i.motivoOtro.trim();
    else if (i.motivo) motivoLabel = i.motivo;
  }

  // 3. Campos específicos de Interconsulta
  state.formData.especialidad_destino = especialidadLabel;
  state.formData.motivo_interconsulta = motivoLabel;
  state.formData.tipo_pregunta = i.tipoPregunta || '';
  state.formData.pregunta_especifica = (i.preguntaTexto || '').trim();
  state.formData.inherited_from_expediente = i.heritedFromExp ? 'Sí' : 'No';
}

/* -------- Herencia Expediente → Interconsulta -------- */

function detectSuggestedSpecialty(reportText) {
  if (!reportText) return '';
  for (const entry of SPECIALTY_REGEX) {
    if (entry.rx.test(reportText)) return entry.key;
  }
  return '';
}

function inheritExpedienteToInterconsulta(reportText) {
  // Los datos clínicos viven en state.expData y permanecen intactos.
  // Solo inicializamos los campos exclusivos de Interconsulta y marcamos herencia.

  state.interData = emptyInterData();
  const i = state.interData;
  i.heritedFromExp = true;
  i.expedienteReport = reportText || '';

  // Detectar especialidad sugerida del reporte
  const suggested = detectSuggestedSpecialty(reportText);
  if (suggested) i.especialidad = suggested;

  // Cambiar módulo a interconsulta
  state.module = 'interconsulta';
  state.sessionCreditUsed = false;       // la interconsulta cobra su propio crédito
  state.conversationHistory = [];
  state.reviewTurn = 0;

  // Decidir acordeón inicial:
  // - si detectamos especialidad, vamos directo a la pregunta (datos clínicos ya están)
  // - si no, abrir destino para que el doctor elija especialidad
  i.accordionOpen = suggested ? 'pregunta' : 'destino';

  // Limpiar UI del reporte previo y re-renderizar módulo Interconsulta
  document.getElementById('response').innerHTML = '';
  hide('response-wrap');
  hide('followup');
  document.getElementById('chat-history').innerHTML = '';
  show('module-view');
  hide('home');

  renderModuleForm();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function openModule(key) {
  state.module = key;
  state.sessionCreditUsed = false;
  state.conversationHistory = [];
  state.formData = {};
  state.reviewMode = false;  // off por default, siempre
  state.reviewTurn = 0;
  if (key === 'expediente') state.expData = emptyExpData();
  if (key === 'interconsulta') {
    // Entrada directa a Interconsulta (no herencia): expediente e interData limpios
    state.expData = emptyExpData();
    state.interData = emptyInterData();
  }
  hide('view-home'); show('view-module');
  hide('response-wrap'); hide('followup'); hide('upgrade-module');
  document.getElementById('error-box').innerHTML = '';
  document.getElementById('chat-history').innerHTML = '';
  renderModuleForm();
  window.scrollTo(0, 0);
}

function goHome() {
  state.module = null;
  hide('view-module'); show('view-home');
  renderAll();
  window.scrollTo(0, 0);
}

function renderAll() {
  renderCreditsPill();
  renderWelcome();
  renderModules();
