  else hide('upgrade-home');
  if (state.module) renderModuleForm();
}

async function fetchProfile() {
  if (!state.userEmail) { state.credits = null; return; }
  try {
    const url = N8N_PROFILE_URL + '?email=' + encodeURIComponent(state.userEmail);
    const r = await fetch(url, { method: 'GET' });
    if (!r.ok) throw new Error('profile fetch failed');
    const data = await r.json();
    state.credits = Number(data.credits_balance) || 0;
  } catch (e) { console.warn('Profile error:', e); state.credits = null; }
  renderCreditsPill();
  if (state.credits !== null && state.credits <= 0 && !state.module) renderUpgradeCard('upgrade-home');
}

function mdToHtml(md) {
  if (!md) return '';
  let s = String(md);
  s = s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  s = s.replace(/```([\s\S]*?)```/g, (_, c) => `<pre><code>${c}</code></pre>`);
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  s = s.replace(/((?:^\|.+\|\s*\n)+)/gm, block => {
    const lines = block.trim().split('\n');
    if (lines.length < 2) return block;
    const headerCells = lines[0].slice(1, -1).split('|').map(x => x.trim());
    const sep = lines[1];
    if (!/^\|[\s\-:|]+\|$/.test(sep)) return block;
    const rows = lines.slice(2).map(l => l.slice(1, -1).split('|').map(x => x.trim()));
    let html = '<table><thead><tr>' + headerCells.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';
    rows.forEach(r => { html += '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '</tr>'; });
    html += '</tbody></table>';
    return html;
  });
  s = s.replace(/^(?:-|\*) (.+)$/gm, '<li>$1</li>');
  s = s.replace(/(<li>.*?<\/li>\s*)+/gs, m => `<ul>${m.trim()}</ul>`);
  s = s.replace(/^(\d+)\. (.+)$/gm, '<oli>$2</oli>');
  s = s.replace(/(<oli>.*?<\/oli>\s*)+/gs, m => `<ol>${m.replace(/<oli>/g, '<li>').replace(/<\/oli>/g, '</li>')}</ol>`);
  // Asegurar que listas queden separadas del texto previo/siguiente
  // para que el split por \n\n no las envuelva en <p>...</p>
  s = s.replace(/([^\n])\n+(<ul>|<ol>)/g, '$1\n\n$2');
  s = s.replace(/(<\/ul>|<\/ol>)\n*([^\n])/g, '$1\n\n$2');
  s = s.split(/\n{2,}/).map(block => {
    if (/^<(h\d|ul|ol|pre|table|blockquote)/.test(block.trim())) return block;
    return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
  s = applyClinicalHighlights(s);
  return s;
}

/* Aplica resaltado clínico al HTML ya renderizado por mdToHtml.
 * Detecta tokens del agente MindStudio (en bold con marcadores específicos)
 * y los envuelve en spans con clases coloreadas.
 * Si el agente cambia su formato, esta función solo deja el bold normal
 * (sin colores) — no se rompe nada. */
function applyClinicalHighlights(html) {
  if (!html) return '';
  // Badges de cabecera de riesgo
  html = html.replace(/<strong>\[ALTO RIESGO\]<\/strong>/g, '<span class="risk-high">[ALTO RIESGO]</span>');
  html = html.replace(/<strong>\[PRECAUCIÓN\]<\/strong>/g, '<span class="risk-warn">[PRECAUCIÓN]</span>');
  html = html.replace(/<strong>\[BAJO RIESGO\]<\/strong>/g, '<span class="risk-low">[BAJO RIESGO]</span>');
  // Sub-labels de sección (con dos puntos al final)
  html = html.replace(/<strong>No usar:<\/strong>/g, '<span class="label-avoid">No usar:</span>');
  html = html.replace(/<strong>Evitar:<\/strong>/g, '<span class="label-avoid">Evitar:</span>');
  html = html.replace(/<strong>Sí usar:<\/strong>/g, '<span class="label-use">Sí usar:</span>');
  html = html.replace(/<strong>Si usar:<\/strong>/g, '<span class="label-use">Si usar:</span>');
  html = html.replace(/<strong>Redundancias:<\/strong>/g, '<span class="label-warn">Redundancias:</span>');
  // Badges de decisión final
  html = html.replace(/<strong>DECISIÓN: PROCEDER<\/strong>/g, '<span class="decision-go">DECISIÓN: PROCEDER</span>');
  html = html.replace(/<strong>DECISION: PROCEDER<\/strong>/g, '<span class="decision-go">DECISION: PROCEDER</span>');
  html = html.replace(/<strong>DECISIÓN: AJUSTAR RECETA<\/strong>/g, '<span class="decision-adjust">DECISIÓN: AJUSTAR RECETA</span>');
  html = html.replace(/<strong>DECISION: AJUSTAR RECETA<\/strong>/g, '<span class="decision-adjust">DECISION: AJUSTAR RECETA</span>');
  html = html.replace(/<strong>DECISIÓN: CONSULTAR ESPECIALISTA<\/strong>/g, '<span class="decision-stop">DECISIÓN: CONSULTAR ESPECIALISTA</span>');
  html = html.replace(/<strong>DECISION: CONSULTAR ESPECIALISTA<\/strong>/g, '<span class="decision-stop">DECISION: CONSULTAR ESPECIALISTA</span>');
  // Riesgo inline en bullets de alertas
  html = html.replace(/Riesgo: <strong>alto<\/strong>/g, 'Riesgo: <span class="risk-inline-high">alto</span>');
  html = html.replace(/Riesgo: <strong>moderado<\/strong>/g, 'Riesgo: <span class="risk-inline-warn">moderado</span>');
  html = html.replace(/Riesgo: <strong>bajo<\/strong>/g, 'Riesgo: <span class="risk-inline-low">bajo</span>');
  return html;
}

/* -------- async polling helper -------- */
const POLL_INTERVAL_MS = 3000;
const POLL_TIMEOUT_MS  = 5 * 60 * 1000; // 5 min

async function pollForResult(sessionId, { onTimeout } = {}) {
  const start = Date.now();
  // Grace period para 'not_found': Google Sheets tiene consistencia eventual,
  // el primer poll puede llegar antes de que Sheets propague el APPEND inicial.
  const NOT_FOUND_GRACE_MS = 30000;
  while (true) {
    if (Date.now() - start > POLL_TIMEOUT_MS) {
      if (onTimeout) {
        const keepWaiting = await onTimeout(sessionId);
        if (keepWaiting) {
          return pollForResult(sessionId, { onTimeout });
        }
      }
      throw new Error('TIMEOUT');
    }
    await new Promise(res => setTimeout(res, POLL_INTERVAL_MS));
    let r;
    try {
      r = await fetch(`${N8N_RESULT_URL}?session_id=${encodeURIComponent(sessionId)}`, { method: 'GET' });
    } catch (e) {
      continue; // error de red puntual: seguir intentando hasta timeout
    }
    if (!r.ok) continue;
    let data;
    try { data = await r.json(); } catch { continue; }
    if (data.status === 'done')      return data.response || '';
    if (data.status === 'error')     throw new Error(data.message || 'ERROR');
    if (data.status === 'not_found') {
      // Race condition con escritura de Sheets: tolerar durante grace period.
      if (Date.now() - start < NOT_FOUND_GRACE_MS) continue;
      throw new Error('NOT_FOUND');
    }
    // 'processing' → seguir el loop
  }
}

async function submitQuery(userMessage, opts = {}) {
  const isFollowup = !!opts.isFollowup;
  const isFirstMessage = !state.sessionCreditUsed;
  const L = t();
  const errBox = document.getElementById('error-box');
  errBox.innerHTML = '';

  const historyText = state.conversationHistory.map(m => {
    const role = m.role === 'user' ? 'Doctor' : 'Assistant';
    return `${role}: ${m.content}`;
  }).join('\n');

  const body = {
    user_email: state.userEmail,
    last_message: userMessage,
    history: historyText,
    language: state.language,
    is_first_message: isFirstMessage,
    review_mode: state.reviewMode,
    tipo_de_reporte: TIPO_DE_REPORTE_MAP[state.module] || '',
    nombre_paciente: state.formData.nombre_paciente || '',
    HistClin: state.formData.HistClin || '',
    procedimiento: state.formData.procedimiento || '',
    anestesia: state.formData.anestesia || '',
    medstomando: state.formData.medstomando || '',
    receta: state.formData.receta || '',
    laser_pbm: state.formData.laser_pbm || '',
    objetivo_PBM: state.formData.objetivo_PBM || '',
    dispositivo_laser: state.formData.dispositivo_laser || '',
    peso_paciente: state.formData.peso_paciente || '',
    medicamento: state.formData.medicamento || '',
    condicion: state.formData.condicion || '',
    area_tratamiento: state.formData.area_tratamiento || '',
    query: state.formData.query || '',
    // Campos específicos de Interconsulta
    especialidad_destino: state.formData.especialidad_destino || '',
    motivo_interconsulta: state.formData.motivo_interconsulta || '',
    tipo_pregunta: state.formData.tipo_pregunta || '',
    pregunta_especifica: state.formData.pregunta_especifica || '',
    inherited_from_expediente: state.formData.inherited_from_expediente || 'No',
  };

  if (!isFollowup) {
    show('response-wrap');
    document.getElementById('response').innerHTML = `<div class="loading"><div class="spinner"></div><span>${L.loading}</span></div>`;
    document.getElementById('submit-btn').disabled = true;
    // Si arrancamos en Modo Revisión, marcar turno 1
    if (state.reviewMode && isFirstMessage) state.reviewTurn = 1;
  } else {
    appendChatMsg('user', userMessage);
    const history = document.getElementById('chat-history');
    const loadingMsg = document.createElement('div');
    loadingMsg.className = 'chat-msg assistant';
    loadingMsg.innerHTML = `<div class="loading"><div class="spinner"></div><span>${L.loading}</span></div>`;
    loadingMsg.dataset.loading = '1';
    history.appendChild(loadingMsg);
    history.scrollTop = history.scrollHeight;
    document.getElementById('chat-send').disabled = true;
  }

  try {
    // 1) Iniciar generación async
    const r = await fetch(N8N_CHAT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (r.status === 403) {
      state.credits = 0; renderCreditsPill();
      if (!isFollowup) { document.getElementById('response').innerHTML = ''; hide('response-wrap'); }
      else removeLoadingChatMsg();
      renderUpgradeCard('upgrade-module');
      return;
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const initData = await r.json();
    const sessionId = initData.session_id;
    if (!sessionId) throw new Error('NO_SESSION_ID');

    // 2) Descontar crédito local apenas el backend acepta (el backend ya lo cobró)
    if (isFirstMessage) {
      state.sessionCreditUsed = true;
      if (state.credits !== null && state.credits > 0) state.credits -= 1;
      renderCreditsPill();
      renderReviewToggle(); // ahora se oculta porque sessionCreditUsed=true
    }

    // 3) Polling con opción de extender tras timeout
    const answer = await pollForResult(sessionId, {
      onTimeout: async () => {
        return new Promise(resolve => {
          const msg = state.language === 'es'
            ? 'El reporte está tardando más de lo normal. ¿Seguir esperando?'
            : 'The report is taking longer than usual. Keep waiting?';
          resolve(window.confirm(msg));
        });
      }
    });

    // 4) Pintar respuesta
    state.conversationHistory.push({ role: 'user', content: userMessage });
    state.conversationHistory.push({ role: 'assistant', content: answer });
    if (!isFollowup) {
      const respEl = document.getElementById('response');
      respEl.innerHTML = mdToHtml(answer);
      show('followup');
      // Si arrancamos en Modo Revisión, esta respuesta es la verificación → chips
      if (state.reviewTurn === 1) {
        renderReviewChips(respEl);
      } else if (state.module === 'expediente') {
        // Acción al final del reporte del Expediente: generar carta de interconsulta
        renderExpedienteNextStep(respEl, answer);
      }
    } else {
      removeLoadingChatMsg();
      appendChatMsg('assistant', answer);
      // Si esta respuesta corresponde al turno 2 del Modo Revisión, apagar
      if (state.reviewTurn === 2) {
        state.reviewMode = false;
        state.reviewTurn = 3;
        // Restaurar placeholder original del chat-input
        const chatIn = document.getElementById('chat-input');
        if (chatIn) chatIn.placeholder = t().followup_placeholder;
      }
    }
  } catch (e) {
    console.error(e);
    if (!isFollowup) { document.getElementById('response').innerHTML = ''; hide('response-wrap'); }
    else removeLoadingChatMsg();
    errBox.innerHTML = `<div class="error-banner">${L.error_network}</div>`;
  } finally {
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('chat-send').disabled = false;
  }
}

/* -------- Render: bloque "siguiente paso" tras reporte del Expediente -------- */
function renderExpedienteNextStep(targetEl, reportText) {
  if (!targetEl) return;
  const L = t().inter;
  const wrap = document.createElement('div');
  wrap.className = 'next-step-wrap';

  // Detectar especialidad sugerida para mostrarla en el botón
  const suggested = detectSuggestedSpecialty(reportText);
  let suggestedLabel = '';
  if (suggested) {
    const esp = INTER_DATA.especialidades.find(e => e.key === suggested);
    if (esp) suggestedLabel = esp.label;
  }

  const btnInterLabel = suggestedLabel
    ? `${L.btn_generar} → ${suggestedLabel}`
    : L.btn_generar;

  wrap.innerHTML = `
    <button type="button" class="next-step-btn next-step-inter" id="ns-btn-inter">
      <span class="next-step-icon">→</span>
      <span class="next-step-text">${escapeHtml(btnInterLabel)}</span>
    </button>
  `;
  targetEl.appendChild(wrap);

  document.getElementById('ns-btn-inter').addEventListener('click', () => {
    inheritExpedienteToInterconsulta(reportText);
  });
}

function appendChatMsg(role, text) {
  const history = document.getElementById('chat-history');
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  div.innerHTML = role === 'assistant' ? mdToHtml(text) : escapeHtml(text);
  history.appendChild(div);
  history.scrollTop = history.scrollHeight;
}
function removeLoadingChatMsg() {
  const history = document.getElementById('chat-history');
  const loading = history.querySelector('[data-loading="1"]');
  if (loading) loading.remove();
}
function escapeHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function validateForm() {
  if (state.module === 'consulta') return (state.formData.query || '').trim().length > 0;
  if (state.module === 'expediente') {
    const e = state.expData;
    // Permite enviar si hay AL MENOS: chips seleccionados, nota, nombre o cualquier dato
    const anyChip = e.genero || e.edadRango || e.edadExacto || e.pesoRango || e.pesoExacto ||
                    e.tallaRango || e.tallaExacto || e.condiciones.length > 0 || e.condicionesOtro ||
                    e.meds.length > 0 || e.procSpec || e.anestesicos.length > 0 || e.anestesiaOtro ||
                    (e.receta || '').trim() || e.usaPBM;
    const anyText = (e.nota || '').trim() || (e.nombre || '').trim();
    return !!(anyChip || anyText);
  }
  if (state.module === 'interconsulta') {
    const i = state.interData;
    const e = state.expData;
    const hasEsp = !!i.especialidad;
    const hasMotivo = !!i.motivo && (i.motivo !== 'Otro' || (i.motivoOtro || '').trim().length > 0);
    const hasPregunta = (i.preguntaTexto || '').trim().length > 0;
    // Caso clínico: mismo criterio del Expediente (al menos un chip o texto)
    const anyChip = e.genero || e.edadRango || e.edadExacto || e.pesoRango || e.pesoExacto ||
                    e.tallaRango || e.tallaExacto || e.condiciones.length > 0 || e.condicionesOtro ||
                    e.meds.length > 0 || e.procSpec || e.anestesicos.length > 0 || e.anestesiaOtro ||
                    (e.receta || '').trim() || e.usaPBM;
    const anyText = (e.nota || '').trim() || (e.nombre || '').trim();
    const hasCaso = !!(anyChip || anyText);
    return hasEsp && hasMotivo && hasPregunta && hasCaso;
  }
  return true;
}

function bindEvents() {
  document.getElementById('lang-select').addEventListener('change', e => setLang(e.target.value));
  document.getElementById('back-btn').addEventListener('click', goHome);

  document.getElementById('submit-btn').addEventListener('click', () => {
    if (state.credits !== null && state.credits <= 0 && !state.sessionCreditUsed) {
      renderUpgradeCard('upgrade-module');
      return;
    }
    // For expediente, build formData from expData first
    if (state.module === 'expediente') buildExpedienteFormData();
    if (state.module === 'interconsulta') buildInterconsultaFormData();

    if (!validateForm()) {
      const msg = state.module === 'expediente' ? t().error_empty : t().error_generic;
      document.getElementById('error-box').innerHTML = `<div class="error-banner">${msg}</div>`;
      return;
    }
    const payloadSummary = buildInitialMessage();
    submitQuery(payloadSummary, { isFollowup: false });
  });

  const chatInput = document.getElementById('chat-input');
  const chatSend = document.getElementById('chat-send');
  const sendChat = () => {
    const val = chatInput.value.trim();
    if (!val) return;
    chatInput.value = '';
    submitQuery(val, { isFollowup: true });
  };
  chatSend.addEventListener('click', sendChat);
  chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  });
}

function buildInitialMessage() {
  const mod = state.module;
  const f = state.formData;
  if (mod === 'consulta') return f.query || '';
  const lines = [];
  if (f.nombre_paciente) lines.push(`Paciente: ${f.nombre_paciente}`);
  if (f.HistClin) lines.push(`Historia clínica: ${f.HistClin}`);
  if (f.procedimiento) lines.push(`Procedimiento: ${f.procedimiento}`);
  if (f.anestesia) lines.push(`Anestésico: ${f.anestesia}`);
  if (f.medstomando) lines.push(`Medicamentos actuales: ${f.medstomando}`);
  if (f.receta) lines.push(`A recetar: ${f.receta}`);
  if (f.laser_pbm) lines.push(`Láser/PBM: ${f.laser_pbm}`);
  if (f.objetivo_PBM) lines.push(`Objetivo PBM: ${f.objetivo_PBM}`);
  if (f.dispositivo_laser) lines.push(`Dispositivo: ${f.dispositivo_laser}`);
  if (f.peso_paciente) lines.push(`Peso: ${f.peso_paciente} kg`);
  if (f.medicamento) lines.push(`Medicamento: ${f.medicamento}`);
  if (f.condicion) lines.push(`Condición: ${f.condicion}`);
  if (f.area_tratamiento) lines.push(`Área: ${f.area_tratamiento}`);
  return lines.join('\n');
}

async function init() {
  parseURL();
  document.getElementById('lang-select').value = state.language;
  document.documentElement.lang = state.language;
  bindEvents();
  renderAll();
  await fetchProfile();
  if (state.module) openModule(state.module);
}

init();
</script>
